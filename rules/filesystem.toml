# Filesystem Permission Gate
#
# Handles filesystem modification commands:
# - rm: File/directory removal
# - mv: Move/rename files
# - cp: Copy files
# - mkdir: Create directories
# - touch: Create/update files
# - chmod/chown/chgrp: Permission changes
# - ln: Create links
# - sed -i: In-place editing
# - perl -i: In-place editing
# - tar: Archive operations
# - unzip/zip: Archive operations
#
# Special handling:
# - rm with /, ~, /* is blocked (catastrophic)
# - rm with .., ../, * asks with warning
# - tar -t and unzip -l are read-only (listing)

[meta]
name = "filesystem"
description = "Filesystem modification permission gate"
priority = 30

# =============================================================================
# RM (complex - needs custom handler for path checking)
# =============================================================================

[[programs]]
name = "rm"
unknown_action = "ask"

# Block catastrophic rm patterns
[[programs.block]]
if_args_contain = [" /", " /*", " ~/", " ~/*"]
reason = "`rm` against `/` or `~/` blocked: would recursively delete the system or home tree. No legitimate use in an agent workflow."

[[programs.block]]
subcommand = "-rf /"
reason = "`rm -rf /` blocked: would recursively delete the entire root filesystem."

[[programs.block]]
subcommand = "-rf /*"
reason = "`rm -rf /*` blocked: would recursively delete every top-level directory under root."

[[programs.block]]
subcommand = "-rf ~"
reason = "`rm -rf ~` blocked: would recursively delete the user's home directory."

[[programs.block]]
subcommand = "-fr /"
reason = "`rm -fr /` blocked: would recursively delete the entire root filesystem."

[[programs.block]]
subcommand = "-fr ~"
reason = "`rm -fr ~` blocked: would recursively delete the user's home directory."

# Note: Custom handler also checks for:
# - Path normalization (// -> /, /. -> /)
# - Path traversal with ..
# - Risky patterns: .., ../, *
[[custom_handlers]]
program = "rm"
handler = "check_rm"
description = "Check for catastrophic paths (blocked) and risky patterns (ask with warning)"

# =============================================================================
# MV (always asks)
# =============================================================================

[[programs]]
name = "mv"
unknown_action = "ask"

[[programs.ask]]
reason = "Moves or renames files. Overwrites destination if it exists unless `-n` is set."

# =============================================================================
# CP (always asks)
# =============================================================================

[[programs]]
name = "cp"
unknown_action = "ask"

[[programs.ask]]
reason = "Copies files or directories. Overwrites destination by default; `-n` to skip existing."

# =============================================================================
# MKDIR (always asks)
# =============================================================================

[[programs]]
name = "mkdir"
unknown_action = "ask"

[[programs.ask]]
reason = "Creates a directory. `-p` also creates missing parent directories."
accept_edits_auto_allow = true

# =============================================================================
# RMDIR (always asks - removes empty directories)
# =============================================================================

[[programs]]
name = "rmdir"
unknown_action = "ask"

[[programs.ask]]
reason = "Removes empty directories. Fails if the directory contains files; use `rm -r` for non-empty trees."

# =============================================================================
# TOUCH (always asks)
# =============================================================================

[[programs]]
name = "touch"
unknown_action = "ask"

[[programs.ask]]
reason = "Creates an empty file or updates the mtime/atime of an existing one."

# =============================================================================
# CHMOD/CHOWN/CHGRP (always asks)
# =============================================================================

[[programs]]
name = "chmod"
unknown_action = "ask"

[[programs.ask]]
reason = "Changes file/dir mode bits. Use the minimum needed: 755 for dirs, 644 for files. Avoid 777 unless you know why."

[[programs]]
name = "chown"
unknown_action = "ask"

[[programs.ask]]
reason = "Changes file ownership. Verify the target user/group exists before running."

[[programs]]
name = "chgrp"
unknown_action = "ask"

[[programs.ask]]
reason = "Changes file group. Verify the target group exists before running."

# =============================================================================
# LN (always asks)
# =============================================================================

[[programs]]
name = "ln"
unknown_action = "ask"

[[programs.ask]]
reason = "Creates a hard or symbolic link. `-s` for symlink, `-f` to overwrite an existing link target."

# =============================================================================
# SED with -i (in-place edit)
# =============================================================================
# Note: sed without -i is handled by basics gate

[[conditional_allow]]
program = "sed"
description = "sed is safe without -i flag (in-place edit)"
unless_flags = ["-i", "--in-place"]
on_flag_present = "ask"
accept_edits_auto_allow = true

# =============================================================================
# PERL (always asks - can execute arbitrary code via -e, system(), etc.)
# =============================================================================

[[programs]]
name = "perl"
unknown_action = "ask"

[[programs.ask]]
reason = "perl can execute arbitrary code via `-e`, `-E`, `system()`, or backticks. Treat like running an inline script."

# =============================================================================
# TAR (list safe, extract/create asks)
# =============================================================================

[[programs]]
name = "tar"
unknown_action = "ask"

# List contents is safe (-t, --list, or combined like -tvf)
[[programs.allow]]
subcommand = "-t"

[[programs.allow]]
subcommand = "--list"

# Note: Custom handler needed for combined flags like -tvf, -xf, -cf
[[custom_handlers]]
program = "tar"
handler = "check_tar"
description = "Check for t flag (list=safe) vs x/c flags (extract/create=ask)"

# =============================================================================
# UNZIP (list safe, extract asks)
# =============================================================================

[[programs]]
name = "unzip"
unknown_action = "ask"

# List contents is safe (read-only)
[[programs.allow]]
if_flags_any = ["-l"]

[[programs.ask]]
reason = "Extracts a zip archive. Verify trust; paths inside the archive can use `..` for directory traversal."

# =============================================================================
# ZIP (always asks - note: -l flag converts line endings, does NOT list contents)
# =============================================================================

[[programs]]
name = "zip"
unknown_action = "ask"

# Note: -l flag converts line endings (CR-LF to Unix), it does NOT list contents
# Use zipinfo to list zip contents (which is in basics safe_commands)

[[programs.ask]]
reason = "Creates or modifies a zip archive. Writes the destination path; existing archives are updated in place."
