# Tool Gates Self-Permission Gate
#
# Handles the `tool-gates` CLI itself:
# - Read-only queries (pending list, rules list, status, help, version)
# - Write operations (approve, rules remove, pending clear, hooks add)
# - Interactive TUI (review)
#
# Pattern: Read-only operations are safe, writes need approval

[meta]
name = "Tool Gates CLI"
description = "Tool Gates CLI permission gate"
priority = 23
lede = "tool-gates protects itself. Read-only queries (inspecting the pending queue, listing rules, hook status, doctor) skip prompting. Writes to settings files or the cache ask. See the <a href=\"../cli.html\">CLI reference</a> for the full subcommand set."
behavior_tags = ["aliases <b>bash-gates</b> → <b>tool-gates</b>"]

[meta.card_titles]
allow = "inspection"
ask = "mutations"

# =============================================================================
# TOOL-GATES (main CLI)
# =============================================================================

[[programs]]
name = "tool-gates"
aliases = ["bash-gates"]
unknown_action = "ask"   # Unknown subcommands need approval

# =============================================================================
# READ-ONLY COMMANDS (always safe)
# =============================================================================

# -----------------------------------------------------------------------------
# Pending Queue Queries
# -----------------------------------------------------------------------------

[[programs.allow]]
subcommand = "pending list"
reason = "Inspect the pending-approvals queue."

# -----------------------------------------------------------------------------
# Rules Queries
# -----------------------------------------------------------------------------

[[programs.allow]]
subcommand = "rules list"
reason = "List active permission rules."

# -----------------------------------------------------------------------------
# Hook Status
# -----------------------------------------------------------------------------

[[programs.allow]]
subcommand = "hooks status"
reason = "Report hook wiring per client / scope."

[[programs.allow]]
subcommand = "hooks json"
reason = "Report hook wiring per client / scope."

# -----------------------------------------------------------------------------
# Diagnostics / Audits (read-only)
# -----------------------------------------------------------------------------

[[programs.allow]]
subcommand = "doctor"
reason = "Health check. Read-only; safe to run anytime."

[[programs.allow]]
subcommand = "rules ask-audit"
reason = "Categorise `permissions.ask` rules. Read-only listing without `--apply`."

[[programs.allow]]
subcommand = "agy allowlist"
reason = "Print the Antigravity native permissions.allow block for safe commands. Read-only without --apply."

# -----------------------------------------------------------------------------
# Info / Help / Version
# -----------------------------------------------------------------------------

[[programs.allow]]
if_flags_any = ["--help", "-h"]
reason = "Info flags."

[[programs.allow]]
if_flags_any = ["--version", "-V"]
reason = "Info flags."

[[programs.allow]]
if_flags_any = ["--tools-status"]
reason = "Info flags."

# =============================================================================
# WRITE OPERATIONS (need approval)
# =============================================================================

# -----------------------------------------------------------------------------
# Approval Management
# -----------------------------------------------------------------------------

[[programs.ask]]
subcommand = "approve"
reason = "Adds a permanent permission rule to your settings.json. Future matching tool calls auto-allow without prompting."

# -----------------------------------------------------------------------------
# Rules Management
# -----------------------------------------------------------------------------

[[programs.ask]]
subcommand = "rules remove"
reason = "Removes a permission rule from a settings file. Future matching tool calls revert to the default gate decision."

# -----------------------------------------------------------------------------
# Pending Queue Management
# -----------------------------------------------------------------------------

[[programs.ask]]
subcommand = "pending clear"
reason = "Empties `~/.cache/tool-gates/pending.jsonl`. Drops every queued approval; cannot be undone."

# -----------------------------------------------------------------------------
# Hook Installation
# -----------------------------------------------------------------------------

[[programs.ask]]
subcommand = "hooks add"
reason = "Writes tool-gates hook entries into the client's settings.json (Claude/Gemini) or hooks.json (Codex/Antigravity). Changes how every future tool call in that scope is gated."

[[programs.ask]]
subcommand = "agy allowlist"
if_flags_any = ["--apply"]
reason = "Merges the safe-command allowlist into agy's settings.json. Changes which commands agy auto-allows without prompting."

# -----------------------------------------------------------------------------
# Interactive TUI
# -----------------------------------------------------------------------------

[[programs.ask]]
subcommand = "review"
reason = "Opens the interactive approval TUI. Selecting Approve writes a permanent permission rule to a settings file."

# -----------------------------------------------------------------------------
# Tool Cache
# -----------------------------------------------------------------------------

[[programs.ask]]
if_flags_any = ["--refresh-tools"]
reason = "Re-scans the system for modern CLI tools (bat, rg, fd, etc.) and rewrites `~/.cache/tool-gates/available-tools.json`. Used to surface hints."
