[meta]
name = "Basic Utilities"
description = "Safe read-only shell commands"
priority = 100
lede = "The default-safe list. Unlike other gates, basics doesn't define per-program rules: it's one big <code>safe_commands = […]</code> array of commands that are always allowed without prompting. Lowest priority (100) so other gates' specific rules win first."
note = """<b>Three custom handlers extend the list.</b> <code>check_xargs</code> allows <code>xargs</code> only when the target command is itself in <code>safe_commands</code>; otherwise asks. <code>check_shell_c</code> parses <code>bash -c '…'</code> / <code>sh -c '…'</code> / <code>zsh -c '…'</code> and checks every command in the inner script. <code>check_command_builtin</code> handles <code>command -v</code> / <code>-V</code> and evaluates other invocations through the gate engine."""
behavior_tags = ["structure <b>safe_commands</b> array", "~180 commands"]

[meta.card_titles]
allow = "default-safe commands"

# Docs-only: groups the safe_commands above into titled categories for the
# generated gate page (a command-chip grid, no decision rows). Every entry in
# safe_commands must appear in exactly one group; a test enforces full coverage.
