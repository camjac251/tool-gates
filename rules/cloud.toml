[[programs.ask]]
subcommand = "run"
reason = "kubectl run: creates a pod in the current namespace from an image. Useful for one-off shells/jobs; leaves a pod behind unless `--rm` is set."

[[programs.ask]]
subcommand = "exec"
reason = "kubectl exec: runs a command inside a running container. Side effects (writes, signals) happen in the live pod."

