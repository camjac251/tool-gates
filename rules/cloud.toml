[[programs.ask]]
subcommand = "annotate"
reason = "kubectl annotate: adds, updates, or removes annotations on a resource. Annotations can configure controllers (ingress, autoscaler, sidecars)."

[[programs.ask]]
subcommand = "taint"
reason = "kubectl taint: adds a taint to a node so non-tolerating pods avoid it. With `NoExecute`, existing non-tolerating pods are evicted."

[[programs.ask]]
subcommand = "drain"
reason = "kubectl drain: cordons the node and evicts its pods to other nodes. Confirm replicas/replacements exist before approving."

[[programs.ask]]
subcommand = "cordon"
reason = "kubectl cordon: marks a node unschedulable. Existing pods stay; new pods land elsewhere."

[[programs.ask]]
