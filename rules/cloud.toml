# =============================================================================
# TERRAFORM / OPENTOFU
# =============================================================================

[[programs]]
name = "terraform"
aliases = ["tofu"]
unknown_action = "ask"

# Read-only commands
[[programs.allow]]
subcommand = "plan"

[[programs.allow]]
subcommand = "show"

[[programs.allow]]
subcommand = "output"

[[programs.allow]]
subcommand = "validate"

[[programs.allow]]
subcommand = "version"

[[programs.allow]]
subcommand = "providers"

[[programs.allow]]
subcommand = "graph"

[[programs.allow]]
subcommand = "-version"

[[programs.allow]]
subcommand = "--version"

[[programs.allow]]
subcommand = "-help"

[[programs.allow]]
subcommand = "--help"

# state subcommands
[[programs.allow]]
subcommand = "state list"

[[programs.allow]]
subcommand = "state show"

# workspace subcommands
[[programs.allow]]
subcommand = "workspace list"

[[programs.allow]]
subcommand = "workspace show"

# test with command=apply (default) creates real infrastructure
[[programs.ask]]
subcommand = "test"
reason = "Terraform test: runs `.tftest.hcl` cases. With `command = apply` (default), test cases create real infrastructure for the duration of the run."

# fmt -check is read-only (just checks, doesn't modify)
[[programs.allow]]
subcommand = "fmt"
if_flags_any = ["-check"]

# Write commands
[[programs.ask]]
subcommand = "console"
reason = "Terraform console: interactive REPL against the current state. Evaluates expressions only, but reads state from the configured backend."

[[programs.ask]]
subcommand = "force-unlock"
reason = "Terraform force-unlock removes a stuck state lock. Confirm no other apply is in progress; concurrent applies corrupt state."

[[programs.ask]]
subcommand = "apply"
reason = "Terraform apply: applies planned changes to real infrastructure. Run `terraform plan` first and review the diff."

[[programs.ask]]
subcommand = "destroy"
reason = "Terraform destroy: tears down resources tracked by this state. Use `-target` to scope; cannot be undone."

[[programs.ask]]
subcommand = "import"
reason = "Terraform import: brings an existing real resource under terraform management. Verify the address matches your config."

[[programs.ask]]
subcommand = "taint"
reason = "Terraform taint: marks a resource for replacement on the next apply. The next `apply` will destroy and recreate it."

[[programs.ask]]
subcommand = "untaint"
reason = "Terraform untaint: clears the tainted mark from a resource so the next apply does not replace it."

[[programs.ask]]
subcommand = "init"
reason = "Terraform init: downloads providers/modules and configures the backend. Writes `.terraform/` and `.terraform.lock.hcl`."

[[programs.ask]]
subcommand = "fmt"
reason = "Terraform fmt: rewrites `.tf` files in place to canonical style. Use `-check` to verify without modifying."
accept_edits_auto_allow = true

# state mutations
[[programs.ask]]
subcommand = "state mv"
reason = "Terraform state mv: renames or reparents resources in state. Validate addresses; mistakes leave resources orphaned."

[[programs.ask]]
subcommand = "state rm"
reason = "Terraform state rm: drops a resource from state without destroying it in the cloud. The resource becomes unmanaged."

[[programs.ask]]
subcommand = "state push"
reason = "Terraform state push: overwrites remote state with local. Take a backup of remote state first."

[[programs.ask]]
subcommand = "state pull"
reason = "Terraform state pull: downloads the current remote state to stdout. Read-only on remote state, but exposes sensitive values."

# workspace mutations
[[programs.ask]]
subcommand = "workspace new"
reason = "Terraform workspace new: creates a new workspace with its own state file. Subsequent commands run against it until switched."

[[programs.ask]]
subcommand = "workspace delete"
reason = "Terraform workspace delete: removes the workspace and its state file. State cannot be recovered after deletion."

[[programs.ask]]
subcommand = "workspace select"
reason = "Terraform workspace select: switches the active workspace. Subsequent plan/apply runs target the selected workspace's state."

