# Write commands
[[programs.ask]]
subcommand = "compute instances create"
reason = "GCE create: provisions a new VM in the project. Billing starts when it boots; verify zone, machine type, and network."

[[programs.ask]]
subcommand = "compute instances delete"
reason = "GCE compute delete: terminates the VM. Persistent disks may or may not be deleted depending on flags."

[[programs.ask]]
subcommand = "compute instances start"
reason = "GCE start: boots a stopped VM. Compute billing resumes once the instance is running."

[[programs.ask]]
subcommand = "compute instances stop"
reason = "GCE stop: shuts the VM down. Connections drop; persistent disks still bill while stopped."

[[programs.ask]]
subcommand = "compute instances reset"
reason = "GCE reset: hard-reboots the VM without a clean shutdown. In-memory state and unflushed disk writes are lost."

[[programs.ask]]
subcommand = "container clusters create"
reason = "GKE create: provisions a new Kubernetes cluster. Control plane and node pools begin billing immediately."

[[programs.ask]]
subcommand = "container clusters delete"
reason = "GKE delete: tears down the cluster including all workloads. Cannot be reversed."

[[programs.ask]]
subcommand = "container clusters resize"
reason = "GKE resize: changes node pool size. Scaling down evicts pods from removed nodes; scaling up adds nodes that begin billing."

[[programs.ask]]
subcommand = "container clusters upgrade"
reason = "GKE upgrade: upgrades the control plane or node pool version. Workloads get rescheduled during node rollouts; cannot be downgraded mid-flight."

[[programs.ask]]
subcommand = "storage cp"
reason = "GCS copy: writes objects into a bucket. May overwrite existing objects at the same key."

[[programs.ask]]
subcommand = "storage mv"
reason = "GCS move: copies then deletes the source. Failure mid-operation can leave partial state at the destination."

[[programs.ask]]
subcommand = "storage rm"
reason = "GCS delete: removes objects from a bucket. Recursive (`-r`) on a prefix deletes every matching object; recovery requires object versioning."

[[programs.ask]]
subcommand = "functions deploy"
reason = "Cloud Functions deploy: uploads source and publishes a new revision. Traffic shifts to the new version once deployment succeeds."

[[programs.ask]]
subcommand = "functions delete"
reason = "Cloud Functions delete: removes the function. Triggers stop firing immediately; callers get errors until recreated."

[[programs.ask]]
subcommand = "run deploy"
reason = "Cloud Run deploy: builds/pulls the image and rolls out a new revision. Traffic shifts to it per the service's traffic policy."

[[programs.ask]]
subcommand = "run services delete"
reason = "Cloud Run delete: removes the service. Live traffic returns 404 until redeploy."

[[programs.ask]]
subcommand = "sql instances create"
reason = "Cloud SQL create: provisions a managed database instance. Billing starts at create time; tier and storage choices are sticky."

[[programs.ask]]
subcommand = "sql instances delete"
reason = "Cloud SQL delete: removes the database instance and its data. Restore requires a prior backup; otherwise data is gone."

[[programs.ask]]
subcommand = "sql instances patch"
reason = "Cloud SQL patch: changes instance settings (tier, flags, maintenance, network). Some changes restart the instance."

[[programs.ask]]
subcommand = "secrets create"
reason = "Secret Manager create: creates a new secret container. Initial payload value (if provided) lands in Cloud audit logs at IAM read."

[[programs.ask]]
subcommand = "secrets delete"
reason = "Secret Manager delete: removes the secret and all its versions. Consumers that read it will start failing immediately."

[[programs.ask]]
subcommand = "projects create"
reason = "GCP project create: provisions a new project under your org/billing. Project IDs are globally unique and cannot be reused."

[[programs.ask]]
subcommand = "projects delete"
reason = "GCP project delete: schedules the project for deletion (30-day grace). All resources go offline immediately."

# Note: Custom handler for 3-word patterns (gcloud <group> <resource> <action>)
[[custom_handlers]]
program = "gcloud"
handler = "check_gcloud"
description = "Handle 3-word patterns: allow list/describe/get actions, ask for create/delete/update/deploy/start/stop"

