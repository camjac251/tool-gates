[[programs.allow]]
subcommand = "config get-value"
reason = "Prints a single gcloud config value (e.g. `project`, `account`). Read-only."

[[programs.allow]]
subcommand = "auth list"
reason = "Lists credentialed accounts and marks the active one. Read-only."

[[programs.allow]]
subcommand = "auth describe"
reason = "Shows details of a credentialed account (token status, scopes). Read-only."

[[programs.allow]]
subcommand = "projects list"
reason = "Lists GCP projects the active account can see. Read-only."

[[programs.allow]]
subcommand = "projects describe"
reason = "Shows metadata for a project (number, state, labels). Read-only."

[[programs.allow]]
subcommand = "compute instances list"
reason = "Lists Compute Engine VMs in the project. Read-only."

[[programs.allow]]
subcommand = "compute instances describe"
reason = "Shows the configuration and status of a VM. Read-only."

[[programs.allow]]
subcommand = "compute zones list"
reason = "Lists available Compute Engine zones. Read-only."

[[programs.allow]]
subcommand = "compute regions list"
reason = "Lists available Compute Engine regions and quotas. Read-only."

[[programs.allow]]
subcommand = "compute machine-types list"
reason = "Lists available machine types per zone. Read-only."

[[programs.allow]]
subcommand = "container clusters list"
reason = "Lists GKE clusters in the project. Read-only."

[[programs.allow]]
subcommand = "container clusters describe"
reason = "Shows the configuration and status of a GKE cluster. Read-only."

[[programs.ask]]
subcommand = "container clusters get-credentials"
reason = "Fetches GKE cluster credentials and writes a context entry to `~/.kube/config`. Subsequent kubectl commands target that cluster."

[[programs.allow]]
subcommand = "storage ls"
reason = "Lists Cloud Storage buckets or objects under a prefix. Read-only."

[[programs.allow]]
subcommand = "storage cat"
reason = "Streams the contents of a Cloud Storage object to stdout. Read-only."

[[programs.allow]]
subcommand = "functions list"
reason = "Lists Cloud Functions in the project. Read-only."

[[programs.allow]]
subcommand = "functions describe"
reason = "Shows the configuration and status of a Cloud Function. Read-only."

[[programs.allow]]
subcommand = "functions logs"
reason = "Reads execution logs for a Cloud Function. Read-only."

[[programs.allow]]
subcommand = "run services list"
reason = "Lists Cloud Run services in the project. Read-only."

[[programs.allow]]
subcommand = "run services describe"
reason = "Shows the configuration, revisions, and traffic split of a Cloud Run service. Read-only."

[[programs.allow]]
subcommand = "sql instances list"
reason = "Lists Cloud SQL instances in the project. Read-only."

[[programs.allow]]
subcommand = "sql instances describe"
reason = "Shows the configuration and status of a Cloud SQL instance. Read-only."

[[programs.allow]]
subcommand = "logging read"
reason = "Reads log entries from Cloud Logging. Read-only."

[[programs.allow]]
subcommand = "iam list"
reason = "Lists IAM resources (roles, service accounts, etc.) in the project. Read-only."

[[programs.allow]]
subcommand = "iam describe"
reason = "Shows details of an IAM resource (role, service account). Read-only."

[[programs.allow]]
subcommand = "secrets list"
reason = "Lists secrets in Secret Manager (names only, not payloads). Read-only."

[[programs.allow]]
subcommand = "secrets describe"
reason = "Shows metadata for a secret (replication, labels). Does not reveal the payload. Read-only."

[[programs.allow]]
subcommand = "secrets versions"
reason = "Lists or describes versions of a secret (state, create time). Read-only; does not print payloads."

[[programs.allow]]
subcommand = "--version"
reason = "Prints the gcloud CLI version. Read-only."

[[programs.allow]]
subcommand = "help"
reason = "Shows gcloud help text. Read-only."

[[programs.allow]]
subcommand = "info"
reason = "Shows gcloud environment diagnostics (SDK paths, active config, account). Read-only."

# Write commands
[[programs.ask]]
subcommand = "compute instances create"
reason = "GCE create: provisions a new VM in the project. Billing starts when it boots; verify zone, machine type, and network."

[[programs.ask]]
subcommand = "compute instances delete"
reason = "GCE compute delete: terminates the VM. Persistent disks may or may not be deleted depending on flags."

[[programs.ask]]
subcommand = "compute instances start"
reason = "GCE start: boots a stopped VM. Compute billing resumes once the instance is running."

[[programs.ask]]
subcommand = "compute instances stop"
reason = "GCE stop: shuts the VM down. Connections drop; persistent disks still bill while stopped."

[[programs.ask]]
subcommand = "compute instances reset"
reason = "GCE reset: hard-reboots the VM without a clean shutdown. In-memory state and unflushed disk writes are lost."

[[programs.ask]]
subcommand = "container clusters create"
reason = "GKE create: provisions a new Kubernetes cluster. Control plane and node pools begin billing immediately."

[[programs.ask]]
subcommand = "container clusters delete"
reason = "GKE delete: tears down the cluster including all workloads. Cannot be reversed."

[[programs.ask]]
subcommand = "container clusters resize"
reason = "GKE resize: changes node pool size. Scaling down evicts pods from removed nodes; scaling up adds nodes that begin billing."

[[programs.ask]]
subcommand = "container clusters upgrade"
reason = "GKE upgrade: upgrades the control plane or node pool version. Workloads get rescheduled during node rollouts; cannot be downgraded mid-flight."

[[programs.ask]]
subcommand = "storage cp"
reason = "GCS copy: writes objects into a bucket. May overwrite existing objects at the same key."

[[programs.ask]]
subcommand = "storage mv"
reason = "GCS move: copies then deletes the source. Failure mid-operation can leave partial state at the destination."

[[programs.ask]]
subcommand = "storage rm"
reason = "GCS delete: removes objects from a bucket. Recursive (`-r`) on a prefix deletes every matching object; recovery requires object versioning."

[[programs.ask]]
subcommand = "functions deploy"
reason = "Cloud Functions deploy: uploads source and publishes a new revision. Traffic shifts to the new version once deployment succeeds."

[[programs.ask]]
subcommand = "functions delete"
reason = "Cloud Functions delete: removes the function. Triggers stop firing immediately; callers get errors until recreated."

[[programs.ask]]
subcommand = "run deploy"
reason = "Cloud Run deploy: builds/pulls the image and rolls out a new revision. Traffic shifts to it per the service's traffic policy."

[[programs.ask]]
subcommand = "run services delete"
reason = "Cloud Run delete: removes the service. Live traffic returns 404 until redeploy."

[[programs.ask]]
subcommand = "sql instances create"
reason = "Cloud SQL create: provisions a managed database instance. Billing starts at create time; tier and storage choices are sticky."

[[programs.ask]]
subcommand = "sql instances delete"
reason = "Cloud SQL delete: removes the database instance and its data. Restore requires a prior backup; otherwise data is gone."

[[programs.ask]]
subcommand = "sql instances patch"
reason = "Cloud SQL patch: changes instance settings (tier, flags, maintenance, network). Some changes restart the instance."

[[programs.ask]]
subcommand = "secrets create"
reason = "Secret Manager create: creates a new secret container. Initial payload value (if provided) lands in Cloud audit logs at IAM read."

[[programs.ask]]
subcommand = "secrets delete"
reason = "Secret Manager delete: removes the secret and all its versions. Consumers that read it will start failing immediately."

[[programs.ask]]
subcommand = "projects create"
reason = "GCP project create: provisions a new project under your org/billing. Project IDs are globally unique and cannot be reused."

[[programs.ask]]
subcommand = "projects delete"
reason = "GCP project delete: schedules the project for deletion (30-day grace). All resources go offline immediately."

# Note: Custom handler for 3-word patterns (gcloud <group> <resource> <action>)
[[custom_handlers]]
program = "gcloud"
handler = "check_gcloud"
description = "Handle 3-word patterns: allow list/describe/get actions, ask for create/delete/update/deploy/start/stop"

# =============================================================================
# AZURE CLI (az)
# =============================================================================

[[programs]]
name = "az"
unknown_action = "ask"

# Simple patterns for Azure
[[programs.allow]]
subcommand = "--version"
reason = "Prints the Azure CLI version and component versions. Read-only."

[[programs.allow]]
subcommand = "--help"
reason = "Shows Azure CLI help text. Read-only."

[[programs.allow]]
subcommand = "-h"
reason = "Shows Azure CLI help text. Read-only."

# Note: az uses declarative rules only (no custom handler needed)
# The Rust code just wraps declarative with a default ask message

# =============================================================================
# TERRAFORM / OPENTOFU
# =============================================================================

[[programs]]
name = "terraform"
aliases = ["tofu"]
unknown_action = "ask"

# Read-only commands
[[programs.allow]]
subcommand = "plan"
reason = "Terraform plan: computes and prints the diff between config and state without changing infrastructure. Read-only."

[[programs.allow]]
subcommand = "show"
reason = "Terraform show: prints the current state or a saved plan in human-readable form. Read-only."

[[programs.allow]]
subcommand = "output"
reason = "Terraform output: prints the values of root module outputs from state. Read-only; may expose sensitive output values."

[[programs.allow]]
subcommand = "validate"
reason = "Terraform validate: checks config for syntax and internal consistency. Read-only; does not touch state or providers' APIs."

[[programs.allow]]
subcommand = "version"
reason = "Prints the Terraform and provider versions. Read-only."

[[programs.allow]]
subcommand = "providers"
reason = "Terraform providers: lists the providers required by the configuration. Read-only."

[[programs.allow]]
subcommand = "graph"
reason = "Terraform graph: emits the dependency graph in DOT format. Read-only."

[[programs.allow]]
subcommand = "-version"
reason = "Prints the Terraform version. Read-only."

[[programs.allow]]
subcommand = "--version"
reason = "Prints the Terraform version. Read-only."

[[programs.allow]]
subcommand = "-help"
reason = "Shows Terraform help text. Read-only."

[[programs.allow]]
subcommand = "--help"
reason = "Shows Terraform help text. Read-only."

# state subcommands
[[programs.allow]]
subcommand = "state list"
reason = "Terraform state list: lists the resource addresses tracked in state. Read-only."

[[programs.allow]]
subcommand = "state show"
reason = "Terraform state show: prints the attributes of one resource from state. Read-only; may expose sensitive values."

# workspace subcommands
[[programs.allow]]
subcommand = "workspace list"
reason = "Terraform workspace list: lists workspaces and marks the active one. Read-only."

[[programs.allow]]
subcommand = "workspace show"
reason = "Terraform workspace show: prints the name of the active workspace. Read-only."

# test with command=apply (default) creates real infrastructure
[[programs.ask]]
subcommand = "test"
reason = "Terraform test: runs `.tftest.hcl` cases. With `command = apply` (default), test cases create real infrastructure for the duration of the run."

# fmt -check is read-only (just checks, doesn't modify)
[[programs.allow]]
subcommand = "fmt"
if_flags_any = ["-check"]
reason = "Terraform fmt -check: reports whether `.tf` files match canonical style without rewriting them. Read-only."

# Write commands
[[programs.ask]]
subcommand = "console"
reason = "Terraform console: interactive REPL against the current state. Evaluates expressions only, but reads state from the configured backend."

[[programs.ask]]
subcommand = "force-unlock"
reason = "Terraform force-unlock removes a stuck state lock. Confirm no other apply is in progress; concurrent applies corrupt state."

[[programs.ask]]
subcommand = "apply"
reason = "Terraform apply: applies planned changes to real infrastructure. Run `terraform plan` first and review the diff."

[[programs.ask]]
subcommand = "destroy"
reason = "Terraform destroy: tears down resources tracked by this state. Use `-target` to scope; cannot be undone."

[[programs.ask]]
subcommand = "import"
reason = "Terraform import: brings an existing real resource under terraform management. Verify the address matches your config."

[[programs.ask]]
subcommand = "taint"
reason = "Terraform taint: marks a resource for replacement on the next apply. The next `apply` will destroy and recreate it."

[[programs.ask]]
subcommand = "untaint"
reason = "Terraform untaint: clears the tainted mark from a resource so the next apply does not replace it."

[[programs.ask]]
subcommand = "init"
reason = "Terraform init: downloads providers/modules and configures the backend. Writes `.terraform/` and `.terraform.lock.hcl`."

[[programs.ask]]
subcommand = "fmt"
reason = "Terraform fmt: rewrites `.tf` files in place to canonical style. Use `-check` to verify without modifying."
accept_edits_auto_allow = true

# state mutations
[[programs.ask]]
subcommand = "state mv"
reason = "Terraform state mv: renames or reparents resources in state. Validate addresses; mistakes leave resources orphaned."

[[programs.ask]]
subcommand = "state rm"
reason = "Terraform state rm: drops a resource from state without destroying it in the cloud. The resource becomes unmanaged."

[[programs.ask]]
subcommand = "state push"
reason = "Terraform state push: overwrites remote state with local. Take a backup of remote state first."

[[programs.ask]]
subcommand = "state pull"
reason = "Terraform state pull: downloads the current remote state to stdout. Read-only on remote state, but exposes sensitive values."

# workspace mutations
[[programs.ask]]
subcommand = "workspace new"
reason = "Terraform workspace new: creates a new workspace with its own state file. Subsequent commands run against it until switched."

[[programs.ask]]
subcommand = "workspace delete"
reason = "Terraform workspace delete: removes the workspace and its state file. State cannot be recovered after deletion."

[[programs.ask]]
subcommand = "workspace select"
reason = "Terraform workspace select: switches the active workspace. Subsequent plan/apply runs target the selected workspace's state."

