# Cloud CLI Permission Gates
#
# Handles cloud provider and container orchestration CLIs:
# - AWS CLI
# - Google Cloud (gcloud)
# - Azure CLI (az)
# - Terraform / OpenTofu
# - Kubernetes (kubectl)
# - Docker / Podman
# - Docker Compose / Podman Compose
# - Helm
# - Pulumi
#
# Note: AWS and gcloud have complex service+action prefix matching
# that requires custom handlers for full coverage.

[meta]
name = "cloud"
description = "Cloud provider and container CLI permission gates"
priority = 15
lede = "The largest gate. Cloud-provider CLIs and container orchestration. AWS uses an <code>action_prefix</code> pattern (every <code>describe-*</code> / <code>list-*</code> / <code>get-*</code> is allow; <code>create-*</code> / <code>delete-*</code> / <code>put-*</code> ask). kubectl, terraform, docker, podman, helm, and pulumi each have their own subcommand maps."
note = """<b>Custom handlers do the heavy lifting.</b> <code>check_gcloud</code> handles 3-word patterns (<code>gcloud compute instances create</code>). <code>check_docker</code> handles <code>docker compose</code> with flags between the subcommand. The action-prefix machinery for AWS is declarative in TOML but enforced in Rust at parse time."""
behavior_tags = [
  "covers <b>aws · gcloud · az · terraform · kubectl · docker · podman · helm · pulumi</b>",
  "<b>action_prefix</b> matching for AWS",
]

[meta.card_titles]
allow = "inspection"
ask = "mutations"

# =============================================================================
# AWS CLI
# =============================================================================
# AWS commands are: aws <service> <action> [options]
# Read: describe-*, list-*, get-* prefixes
# Write: create-*, delete-*, put-*, run-*, start-*, stop-*, terminate-*

[[programs]]
name = "aws"
unknown_action = "ask"

# Simple read commands
[[programs.allow]]
subcommand = "--version"
reason = "Prints the AWS CLI version. Read-only."

[[programs.allow]]
subcommand = "help"
reason = "Shows AWS CLI help text. Read-only."

[[programs.allow]]
subcommand = "s3 ls"
reason = "Lists S3 buckets or objects under a prefix. Read-only."

[[programs.allow]]
subcommand = "sts get-caller-identity"
reason = "Reports the IAM identity of the current credentials (account, ARN, user ID). Read-only."

[[programs.allow]]
subcommand = "sts get-session-token"
reason = "Returns temporary session credentials for the current identity. Read-only call; the returned token grants the same access until it expires."

[[programs.allow]]
subcommand = "configure list"
reason = "Shows the resolved CLI configuration (profile, region, credential source). Read-only; values are masked."

# Read-only action prefixes (args[1] starts with these)
# These match patterns like: aws ec2 describe-instances, aws iam list-users
[[programs.allow]]
action_prefix = "describe"
reason = "AWS describe-* operation: reads the configuration or state of a resource. Read-only."

[[programs.allow]]
action_prefix = "list"
reason = "AWS list-* operation: enumerates resources in the account/region. Read-only."

[[programs.allow]]
action_prefix = "get"
reason = "AWS get-* operation: fetches an attribute, object, or value. Read-only."

[[programs.allow]]
action_prefix = "head"
reason = "AWS head-* operation: fetches metadata only (e.g. S3 object headers) without the body. Read-only."

[[programs.allow]]
action_prefix = "query"
reason = "AWS query operation: reads items from a table or index (e.g. DynamoDB query). Read-only."

[[programs.allow]]
action_prefix = "scan"
reason = "AWS scan operation: reads across a whole table or index (e.g. DynamoDB scan). Read-only; can consume significant read capacity on large tables."

[[programs.allow]]
action_prefix = "filter"
reason = "AWS filter-* operation: reads a filtered view of events or records (e.g. CloudWatch Logs filter). Read-only."

# Write action prefixes - require approval
[[programs.ask]]
action_prefix = "create"
reason = "AWS create operation: provisions a new resource in the account. Verify region, profile, and resource type; provisioning may incur cost."

[[programs.ask]]
action_prefix = "delete"
reason = "AWS delete operation. Verify region, profile, and resource ID before approving; most deletions cannot be reversed."

[[programs.ask]]
action_prefix = "put"
reason = "AWS put operation: writes or overwrites a resource (object, item, policy, parameter). Existing values are replaced; previous content may be lost."

[[programs.ask]]
action_prefix = "update"
reason = "AWS update operation: changes the configuration of an existing resource. Effect is immediate; review the diff first."

[[programs.ask]]
action_prefix = "modify"
reason = "AWS modify operation: changes attributes of a running resource (instance type, security group, parameter). May restart or interrupt the resource."

[[programs.ask]]
action_prefix = "remove"
reason = "AWS remove operation: removes attached items (tags, permissions, members). Effect is immediate."

[[programs.ask]]
action_prefix = "run"
reason = "AWS run operation: launches resources such as EC2 instances or task definitions. Billing starts when they reach running state."

[[programs.ask]]
action_prefix = "start"
reason = "AWS start operation: starts a stopped resource (instance, DB, pipeline). Billing typically resumes once running."

[[programs.ask]]
action_prefix = "stop"
reason = "AWS stop operation: halts a running resource. Connected clients drop; storage bills usually continue."

[[programs.ask]]
action_prefix = "terminate"
reason = "AWS terminate operation: permanently destroys the resource (instance, workflow execution). Attached ephemeral storage is lost."

[[programs.ask]]
action_prefix = "reboot"
reason = "AWS reboot operation: restarts a running resource (instance, cache cluster, DB). Causes downtime during the reboot window."

[[programs.ask]]
action_prefix = "attach"
reason = "AWS attach operation: connects one resource to another (volume to instance, policy to role, gateway to VPC). Live traffic/state may shift."

[[programs.ask]]
action_prefix = "detach"
reason = "AWS detach operation: disconnects an attached resource (volume, policy, network interface). The detached side loses that access."

[[programs.ask]]
action_prefix = "associate"
reason = "AWS associate operation: links resources (route table to subnet, address to instance, IAM identity to provider). May reroute live traffic."

[[programs.ask]]
action_prefix = "disassociate"
reason = "AWS disassociate operation: unlinks resources (address from instance, route table from subnet). May break in-flight traffic."

[[programs.ask]]
action_prefix = "enable"
reason = "AWS enable operation: turns on a feature or service (logging, MFA, region, security control). Effect is immediate."

[[programs.ask]]
action_prefix = "disable"
reason = "AWS disable operation: turns off a feature or service (logging, MFA, security control). Coverage drops immediately."

[[programs.ask]]
action_prefix = "register"
reason = "AWS register operation: registers a target with a service (task definition, target with load balancer, domain). Becomes live to that service."

[[programs.ask]]
action_prefix = "deregister"
reason = "AWS deregister operation: removes a registered target (from load balancer, task definition). The target stops receiving traffic."

[[programs.ask]]
action_prefix = "invoke"
reason = "AWS invoke operation: executes a function or state machine (Lambda, Step Functions). Side effects run in the cloud and may incur cost."

[[programs.ask]]
action_prefix = "publish"
reason = "AWS publish operation: publishes a message, version, or layer (SNS, Lambda version, layer version). Subscribers/consumers see it immediately."

[[programs.ask]]
action_prefix = "send"
reason = "AWS send operation: dispatches a message or signal (SQS, SES, command to instance). Delivery is real-time and may cost per message."

[[programs.ask]]
action_prefix = "tag"
reason = "AWS tag operation: adds tags to a resource. Tags can drive billing allocation and IAM conditions; pick keys/values intentionally."

[[programs.ask]]
action_prefix = "untag"
reason = "AWS untag operation: removes tags from a resource. Tag-based IAM policies and cost allocation depending on those tags will stop applying."

# Blocked commands
[[programs.block]]
subcommand = "iam delete-user"
reason = "Blocked: `aws iam delete-user` removes an IAM identity. Detach policies and rotate access keys via individual commands instead."

[[programs.block]]
subcommand_prefix = "organizations delete"
reason = "Blocked: `aws organizations delete-*` removes organization-level entities (accounts, OUs, policies). Effects span the whole org and are hard to reverse."

# =============================================================================
