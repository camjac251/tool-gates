[[programs.ask]]
subcommand = "restart"
reason = "Podman restart: stops and starts the container. Brief downtime; existing config reapplies."

[[programs.ask]]
subcommand = "pause"
reason = "Podman pause: freezes all processes in the container via cgroups. Connections hang until unpaused."

[[programs.ask]]
subcommand = "unpause"
reason = "Podman unpause: resumes a previously-paused container."

[[programs.ask]]
subcommand = "tag"
reason = "Podman tag: creates a new ref pointing at an existing image. Local-only until pushed."

[[programs.ask]]
subcommand = "commit"
reason = "Podman commit: creates a new image from a container's writable layer. Image is not reproducible from a Containerfile."

[[programs.ask]]
subcommand = "cp"
reason = "Podman cp: copies files between the local FS and a container. Overwrites destination paths."

[[programs.ask]]
subcommand = "login"
reason = "Podman login: writes registry credentials to the auth store. Anyone with read access to the file gets those credentials."

[[programs.ask]]
subcommand = "logout"
reason = "Podman logout: removes registry credentials from the auth store. Subsequent pulls/pushes need to re-auth."

[[programs.ask]]
subcommand = "create"
reason = "Podman create: creates a container without starting it. Useful before a separate `start`."

[[programs.ask]]
subcommand = "pod"
reason = "Podman pod: pod-level operation (create/start/stop/rm). Affects all containers in the pod at once."

[[programs.ask]]
subcommand = "generate"
reason = "Podman generate: emits Kubernetes/systemd config from existing containers or pods to stdout (or a file). May write to disk depending on flags."

[[programs.ask]]
subcommand = "play"
reason = "Podman play: creates pods and containers from a Kubernetes YAML manifest. Pulls images and starts workloads locally."

