# Write commands
[[programs.ask]]
subcommand = "debug"
reason = "kubectl debug: attaches an ephemeral debug container to a running pod or node. The debug container runs with the target's namespace and may have elevated access."

[[programs.ask]]
subcommand = "apply"
reason = "kubectl apply: creates or updates resources from a manifest in the current context/namespace. Drift between cluster and file is reconciled toward the file."

[[programs.ask]]
subcommand = "create"
reason = "kubectl create: imperatively creates a resource in the current context/namespace. Fails if the resource already exists."

[[programs.ask]]
subcommand = "delete"
reason = "kubectl delete: removes the resource from the cluster. Verify namespace/context; many resources cascade-delete dependents."

[[programs.ask]]
subcommand = "edit"
reason = "kubectl edit: opens the live resource in $EDITOR and applies on save. Changes go straight to the cluster; no diff review."

[[programs.ask]]
subcommand = "patch"
reason = "kubectl patch: applies a strategic/JSON/merge patch to a live resource. Effect is immediate; rolling updates can trigger pod restarts."

[[programs.ask]]
subcommand = "replace"
reason = "kubectl replace: replaces a live resource entirely with the manifest. Fields absent from the file are dropped; `--force` deletes and recreates."

[[programs.ask]]
subcommand = "scale"
reason = "kubectl scale: changes the replica count on a Deployment/StatefulSet/ReplicaSet. Scaling to 0 stops the workload."

[[programs.ask]]
subcommand = "rollout"
reason = "kubectl rollout: triggers, pauses, resumes, undoes, or restarts a Deployment/DaemonSet/StatefulSet rollout. Pods get replaced per the strategy."

[[programs.ask]]
subcommand = "expose"
reason = "kubectl expose: creates a Service in front of a workload. With type=LoadBalancer it provisions a cloud LB; type=NodePort opens a node port."

[[programs.ask]]
subcommand = "run"
reason = "kubectl run: creates a pod in the current namespace from an image. Useful for one-off shells/jobs; leaves a pod behind unless `--rm` is set."

[[programs.ask]]
subcommand = "exec"
reason = "kubectl exec: runs a command inside a running container. Side effects (writes, signals) happen in the live pod."

[[programs.ask]]
subcommand = "cp"
reason = "kubectl cp: copies files between local FS and a pod via `tar` in the container. Requires `tar` in the container image."

[[programs.ask]]
subcommand = "port-forward"
reason = "kubectl port-forward: tunnels a local port to a pod/service. Anyone on the local host can reach the forwarded target while running."

[[programs.ask]]
subcommand = "label"
reason = "kubectl label: adds, updates, or removes labels on a resource. Labels drive selectors (Services, NetworkPolicies, scheduling); changes can shift routing."

[[programs.ask]]
subcommand = "annotate"
reason = "kubectl annotate: adds, updates, or removes annotations on a resource. Annotations can configure controllers (ingress, autoscaler, sidecars)."

[[programs.ask]]
subcommand = "taint"
reason = "kubectl taint: adds a taint to a node so non-tolerating pods avoid it. With `NoExecute`, existing non-tolerating pods are evicted."

[[programs.ask]]
subcommand = "drain"
reason = "kubectl drain: cordons the node and evicts its pods to other nodes. Confirm replicas/replacements exist before approving."

[[programs.ask]]
subcommand = "cordon"
reason = "kubectl cordon: marks a node unschedulable. Existing pods stay; new pods land elsewhere."

[[programs.ask]]
subcommand = "uncordon"
reason = "kubectl uncordon: marks a node schedulable again. The scheduler resumes placing new pods on it."

# config mutations
[[programs.ask]]
subcommand = "config set-context"
reason = "kubectl config set-context: writes a context entry to `~/.kube/config`. Sets cluster, user, and default namespace for that context."

[[programs.ask]]
subcommand = "config use-context"
reason = "kubectl config use-context: switches the current context in `~/.kube/config`. Subsequent kubectl commands target the new cluster/namespace."

[[programs.ask]]
subcommand = "config set-cluster"
reason = "kubectl config set-cluster: writes a cluster entry (server URL, CA data) to `~/.kube/config`. Misconfigured CA bypasses TLS verification."

[[programs.ask]]
subcommand = "config set-credentials"
reason = "kubectl config set-credentials: writes auth data (token, cert, exec plugin) to `~/.kube/config`. Anyone with read access to the file gets those credentials."

[[programs.ask]]
subcommand = "config delete-context"
reason = "kubectl config delete-context: removes a context from `~/.kube/config`. The cluster and user entries it referenced are left intact."

[[programs.ask]]
subcommand = "config delete-cluster"
reason = "kubectl config delete-cluster: removes a cluster entry from `~/.kube/config`. Contexts that referenced it stop working."

