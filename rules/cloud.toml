# Write commands
[[programs.ask]]
subcommand = "debug"
reason = "kubectl debug: attaches an ephemeral debug container to a running pod or node. The debug container runs with the target's namespace and may have elevated access."

[[programs.ask]]
subcommand = "apply"
reason = "kubectl apply: creates or updates resources from a manifest in the current context/namespace. Drift between cluster and file is reconciled toward the file."

[[programs.ask]]
subcommand = "create"
reason = "kubectl create: imperatively creates a resource in the current context/namespace. Fails if the resource already exists."

[[programs.ask]]
subcommand = "delete"
reason = "kubectl delete: removes the resource from the cluster. Verify namespace/context; many resources cascade-delete dependents."

[[programs.ask]]
subcommand = "edit"
reason = "kubectl edit: opens the live resource in $EDITOR and applies on save. Changes go straight to the cluster; no diff review."

[[programs.ask]]
subcommand = "patch"
reason = "kubectl patch: applies a strategic/JSON/merge patch to a live resource. Effect is immediate; rolling updates can trigger pod restarts."

[[programs.ask]]
subcommand = "replace"
reason = "kubectl replace: replaces a live resource entirely with the manifest. Fields absent from the file are dropped; `--force` deletes and recreates."

