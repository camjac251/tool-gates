# Beads Issue Tracker Permission Gate
#
# Handles the `bd` CLI (beads issue tracker):
# - Read-only queries (list, show, ready, blocked, etc.)
# - Write operations (create, update, close, delete, etc.)
# - Sync operations (sync, export, import)
# - Admin/dangerous operations (cleanup, reset)
#
# Pattern: Most read operations are safe, writes need approval

[meta]
name = "beads"
description = "Beads issue tracker CLI permission gate"
priority = 22
lede = "Beads git-native issue tracker. Reads are safe; writes ask. Nothing is hard-blocked because every beads state mutation is recoverable through git or remote sync. Two <code>warn = true</code> rules: <code>bd admin reset</code> and <code>bd reset</code> drop the local database."
behavior_tags = ["aliases <b>beads</b> → <b>bd</b>"]

[meta.card_titles]
allow = "queries"
ask = "mutations"

# =============================================================================
# BD (main beads CLI)
# =============================================================================

[[programs]]
name = "bd"
aliases = ["beads"]
unknown_action = "ask" # Unknown subcommands need approval

