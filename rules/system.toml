# =============================================================================
# PROCESS MANAGEMENT
# =============================================================================

[[programs]]
name = "kill"
unknown_action = "ask"

# Signal 0 is just a check (no actual signal sent)
[[programs.allow]]
if_flags_any = ["-0"]

[[programs.ask]]
reason = "Terminating process(es)"

# Note: Custom handler also allows -l/-L (list signals)
[[custom_handlers]]
program = "kill"
handler = "check_kill"
description = "Allow -0 (check process exists) and -l/-L (list signals)"

[[programs]]
name = "pkill"
unknown_action = "ask"

[[programs.ask]]
reason = "Terminating process(es)"

# Note: Custom handler also allows -0 (check pattern exists)
[[custom_handlers]]
program = "pkill"
handler = "check_pkill"
description = "Allow -0 (just checks if matching processes exist, no signal sent)"

[[programs]]
name = "killall"
unknown_action = "ask"

[[programs.ask]]
reason = "Terminating process(es)"

[[programs]]
name = "xkill"
unknown_action = "ask"

[[programs.ask]]
reason = "Terminating process(es)"

