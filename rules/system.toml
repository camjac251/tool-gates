# =============================================================================
# PROCESS MANAGEMENT
# =============================================================================

[[programs]]
name = "kill"
unknown_action = "ask"

# Signal 0 is just a check (no actual signal sent)
[[programs.allow]]
if_flags_any = ["-0"]

[[programs.ask]]
reason = "Sends a signal to the listed PIDs (default SIGTERM). Verify the PID first; `-9` (SIGKILL) cannot be caught and can corrupt state."

# Note: Custom handler also allows -l/-L (list signals)
[[custom_handlers]]
program = "kill"
handler = "check_kill"
description = "Allow -0 (check process exists) and -l/-L (list signals)"

[[programs]]
name = "pkill"
unknown_action = "ask"

[[programs.ask]]
reason = "Signals processes matching a pattern. Run `pgrep <pattern>` first to verify which processes match; `-9` cannot be caught."

# Note: Custom handler also allows -0 (check pattern exists)
[[custom_handlers]]
program = "pkill"
handler = "check_pkill"
description = "Allow -0 (just checks if matching processes exist, no signal sent)"

[[programs]]
name = "killall"
unknown_action = "ask"

[[programs.ask]]
reason = "Signals ALL processes with the given name. Verify which processes match (different from `kill <pid>`); `-9` cannot be caught."

[[programs]]
name = "xkill"
unknown_action = "ask"

[[programs.ask]]
reason = "Click-to-kill X11 utility. Sends a KILL signal to whatever window is clicked next."

