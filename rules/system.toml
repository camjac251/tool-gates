aliases = ["gpg2"]
unknown_action = "ask"

# Read-only operations
[[programs.allow]]
if_flags_any = ["--list-keys", "-k", "--list-secret-keys", "-K"]

[[programs.allow]]
if_flags_any = ["--fingerprint"]

[[programs.allow]]
if_flags_any = ["--verify"]

[[programs.allow]]
if_flags_any = ["--list-packets"]

[[programs.allow]]
if_flags_any = ["--version"]

[[programs.allow]]
if_flags_any = ["--help", "-h"]

# Key operations (ask)
[[programs.ask]]
reason = "Signs data with a GPG private key. `--clearsign` keeps the message readable; `--detach-sign` writes a separate `.sig` file."
if_flags_any = ["--sign", "-s", "--clearsign", "--detach-sign", "-b"]

[[programs.ask]]
reason = "Encrypts data with a GPG recipient key or a passphrase (`--symmetric`)."
if_flags_any = ["--encrypt", "-e", "--symmetric", "-c"]

[[programs.ask]]
reason = "Decrypts a GPG-encrypted file using the matching private key or passphrase."
if_flags_any = ["--decrypt", "-d"]

[[programs.ask]]
reason = "Imports a GPG public or private key into the local keyring. The imported key becomes trusted for signature verification."
if_flags_any = ["--import"]

[[programs.ask]]
reason = "Exports a GPG key. `--export-secret-keys` exports private key material; protect the output file."
if_flags_any = ["--export", "--export-secret-keys"]

[[programs.ask]]
reason = "Deletes a key from the local GPG keyring. `--delete-secret-key` removes private material; cannot be undone without a backup."
if_flags_any = ["--delete-key", "--delete-secret-key", "--delete-secret-and-public-key"]

[[programs.ask]]
reason = "Generates a new GPG keypair. Writes private material to the keyring; choose a passphrase strong enough for the use case."
if_flags_any = ["--gen-key", "--generate-key", "--full-gen-key", "--full-generate-key", "--quick-gen-key"]

[[programs.ask]]
reason = "Opens an interactive GPG key editor. May block in agent contexts; modifies the local keyring."
if_flags_any = ["--edit-key"]

# =============================================================================
# SSH-KEYGEN (key management)
# =============================================================================

[[programs]]
name = "ssh-keygen"
unknown_action = "ask"

# Read-only operations (fingerprint, display)
[[programs.allow]]
if_flags_any = ["-l", "-lf", "-lv"]

[[programs.allow]]
if_flags_any = ["-F"]

[[programs.allow]]
if_flags_any = ["-B"]

# Mutation operations
[[programs.ask]]
reason = "Removes a host from the `known_hosts` file. Next connection will re-prompt for host key verification."
if_flags_any = ["-R"]

[[programs.ask]]
reason = "Generates or modifies an SSH key. Writes a private-key file; protect the output path and passphrase."

# =============================================================================
# AGE (modern encryption tool)
# =============================================================================

[[programs]]
name = "age"
aliases = ["age-keygen"]
unknown_action = "ask"

[[programs.allow]]
if_flags_any = ["--version"]

[[programs.ask]]
reason = "Encrypts or decrypts a file with age. Use `-i <key>` for identity files; output replaces or writes alongside the input."
