[[programs]]
name = "psql"
unknown_action = "ask"

# List databases is safe (read-only)
[[programs.allow]]
if_flags_any = ["-l", "--list"]
reason = "Lists the databases on the PostgreSQL server. Read-only; runs no queries against the data."

# Note: Custom handler needed for -c/-f flag SQL parsing
[[custom_handlers]]
program = "psql"
handler = "check_psql"
description = "Parse -c query for SELECT/\\d (allow) vs INSERT/UPDATE/DELETE (ask), -f always asks"


