# System Command Permission Gate
#
# Handles system-level commands:
# - Database CLIs: psql, mysql, sqlite3, mongosh, redis-cli
# - Process management: kill, pkill, killall, xkill
# - Build tools: make
# - Privilege escalation: sudo, doas
# - Service management: systemctl, service
# - OS package managers: apt, dnf, pacman, brew, etc.
# - System power/disk: shutdown, reboot, mkfs, fdisk (blocked)
# - Scheduling: crontab
# - Low-level: dd
#
# Note: Many of these require custom handlers for complex logic

[meta]
name = "system"
description = "System command permission gate"
priority = 40
lede = "OS-level operations: power, disk, kernel modules, firewall, users, plus database clients and crypto. This gate owns the largest block floor of any gate (30+ patterns). See the <a href=\"../security-floor.html\">Security floor</a> for the full block list."
behavior_tags = [
  "covers <b>databases · build tools · sudo · systemctl · OS package managers · crypto</b>",
  "heavy block floor",
]

[meta.card_titles]
block = "destructive OS operations"
allow = "inspection"
ask = "mutations"

