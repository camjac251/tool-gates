# Write commands
[[programs.ask]]
subcommand = "start"
reason = "Starts a systemd unit. Side effects depend on the unit type (service, socket, timer, etc.)."

[[programs.ask]]
subcommand = "stop"
reason = "Stops a running systemd unit. Active connections/jobs handled by the unit may be cut off."

[[programs.ask]]
subcommand = "restart"
reason = "Stops and starts a systemd unit. Brief downtime; in-flight work in the unit may be lost."

[[programs.ask]]
subcommand = "reload"
reason = "Asks a systemd unit to reload its configuration without restarting. Unit must support SIGHUP-style reload."

[[programs.ask]]
subcommand = "enable"
reason = "Enables a systemd unit to start automatically at boot. Creates symlinks under `/etc/systemd/system/`."

[[programs.ask]]
subcommand = "disable"
reason = "Removes a systemd unit's autostart symlinks. Does not stop a currently running instance."

[[programs.ask]]
subcommand = "mask"
reason = "Symlinks a systemd unit to `/dev/null` so it cannot be started, even as a dependency."

[[programs.ask]]
subcommand = "unmask"
reason = "Removes a systemd mask, allowing the unit to be started again."

[[programs.ask]]
subcommand = "kill"
reason = "Sends a signal to processes of a systemd unit (default SIGTERM). `-s SIGKILL` cannot be caught."

[[programs.ask]]
subcommand = "reset-failed"
reason = "Clears the failed state of a systemd unit so it can be restarted."

[[programs.ask]]
subcommand = "daemon-reload"
reason = "Reloads systemd unit files. Required after editing a unit; doesn't restart running services on its own."

[[programs.ask]]
subcommand = "daemon-reexec"
reason = "Re-executes systemd itself. Drops PID 1 in-place and reloads its state; rarely needed."

[[programs.ask]]
subcommand = "set-default"
reason = "Changes the default systemd target the system boots into (e.g. `graphical.target` vs `multi-user.target`)."

[[programs.ask]]
subcommand = "isolate"
reason = "Switches systemd to the target unit and stops everything not required by it. Can take down unrelated services unexpectedly."

[[programs.ask]]
subcommand = "edit"
reason = "Opens a systemd unit override in `$EDITOR`. Interactive; may block in agent contexts."

# Note: Custom handler checks read-only operations before falling back to declarative
[[custom_handlers]]
program = "systemctl"
handler = "check_systemctl"
description = "Check for read-only ops (status, list-units, is-active, etc.) before declarative rules"

