# Network Permission Gate
#
# Handles network commands:
# - curl: HTTP client
# - wget: Web downloader
# - ssh/scp/sftp: Secure shell and file transfer
# - rsync: File synchronization
# - nc/ncat/netcat: Network connections
# - http/https/xh: HTTPie clients
#
# Patterns:
# - GET requests and head checks are safe
# - POST/PUT/DELETE and downloads ask
# - -e flag for netcat is blocked (reverse shell)
# - rsync --dry-run is safe

[meta]
name = "network"
description = "Network command permission gate"
priority = 35

# =============================================================================
# CURL
# =============================================================================

[[programs]]
name = "curl"
unknown_action = "allow"  # Default is GET which is safe

# Version/help is safe
[[programs.allow]]
subcommand = "--version"

[[programs.allow]]
subcommand = "-h"

[[programs.allow]]
subcommand = "--help"

# HEAD request is safe (read-only)
[[programs.allow]]
if_flags_any = ["-I", "--head"]

# Note: Custom handler needed for:
# - Detecting HTTP method from -X/--request
# - Checking for -d/--data (implies mutation)
# - Checking for -o/-O (download)
[[custom_handlers]]
program = "curl"
handler = "check_curl"
description = "Check HTTP method and data/output flags"

# =============================================================================
# WGET
# =============================================================================

[[programs]]
name = "wget"
unknown_action = "ask"  # Default wget downloads

# Version/help is safe
[[programs.allow]]
subcommand = "--version"

[[programs.allow]]
subcommand = "-h"

[[programs.allow]]
subcommand = "--help"

# Spider mode is safe (just checks URLs, no download)
[[programs.allow]]
if_flags_any = ["--spider"]

# Specific risky patterns
[[programs.ask]]
reason = "Downloads a file from the given URL. Writes to disk; `-O` chooses the output name, `-P` chooses the directory."
if_flags_any = ["-O", "--output-document", "-P", "--directory-prefix"]

[[programs.ask]]
reason = "Recursively downloads pages and linked resources. Can fetch a large amount of data; control depth with `-l`."
if_flags_any = ["-r", "--recursive"]

[[programs.ask]]
reason = "Mirrors a site to local disk. Implies infinite recursion, timestamping, and link conversion."
if_flags_any = ["-m", "--mirror"]

[[programs.ask]]
reason = "Sends a POST request with the given body. Mutating HTTP method; server-side effects depend on the endpoint."
if_flags_any = ["--post-data", "--post-file"]

[[programs.ask]]
reason = "Downloads the given URL to the current directory by default. Writes to disk."

# Note: Custom handler checks spider mode and dangerous download patterns
[[custom_handlers]]
program = "wget"
handler = "check_wget"
description = "Allow --spider (read-only), ask for downloads (-O, -r, -m, --post-*)"

# =============================================================================
# SSH
# =============================================================================

[[programs]]
name = "ssh"
unknown_action = "ask"

[[programs.ask]]
reason = "Opens an SSH connection. Commands executed on the remote bypass local tool-gates; treat the remote as a separate trust boundary."

# =============================================================================
# SCP
# =============================================================================

[[programs]]
name = "scp"
unknown_action = "ask"

[[programs.ask]]
reason = "Copies files over SSH. Overwrites the destination by default; can transfer in either direction."

# =============================================================================
# SFTP
# =============================================================================

[[programs]]
name = "sftp"
unknown_action = "ask"

[[programs.ask]]
reason = "Opens an interactive SFTP session for transferring files over SSH."

# =============================================================================
# RSYNC
# =============================================================================

[[programs]]
name = "rsync"
unknown_action = "ask"

# Dry-run is safe
[[programs.allow_if_flags]]
flags_any = ["-n", "--dry-run"]

[[programs.ask]]
reason = "Synchronizes files between source and destination. `--delete` removes files at the destination not present at source; preview with `-n` first."

# Note: Custom handler checks dry-run flag
[[custom_handlers]]
program = "rsync"
handler = "check_rsync"
description = "Allow --dry-run/-n (preview mode), ask for actual syncs"

# =============================================================================
# NETCAT (nc, ncat, netcat)
# =============================================================================

[[programs]]
name = "nc"
aliases = ["ncat", "netcat"]
unknown_action = "ask"

# -e is blocked (reverse shell)
[[programs.block]]
reason = "netcat `-e` blocked: connects a remote process to a shell on this host (classic reverse shell). No legitimate use in an agent workflow."
if_args_contain = ["-e"]

# -l is listen mode
[[programs.ask]]
reason = "Opens a listening port. The `-e` flag (reverse shell) is blocked separately; verify firewall scope and that you intend to accept inbound connections."
if_flags_any = ["-l"]

[[programs.ask]]
reason = "Opens a netcat connection to the given host/port. Sends/receives raw bytes; verify both endpoints."

# Note: Custom handler blocks -e (reverse shell) and asks for -l (listen)
[[custom_handlers]]
program = "nc"
handler = "check_netcat"
description = "Block -e (reverse shell risk), ask for -l (listen mode), ask for connections"

# =============================================================================
# HTTPIE (http, https, xh)
# =============================================================================

[[programs]]
name = "http"
aliases = ["https", "xh"]
unknown_action = "ask"

# Version/help is safe
[[programs.allow]]
subcommand = "--version"

[[programs.allow]]
subcommand = "--help"

# GET method is safe
[[programs.allow]]
subcommand = "GET"

# URL-only (defaults to GET) is safe for http:// and https://
# Note: Custom handler needed to check if first arg is a URL
[[custom_handlers]]
program = "http"
handler = "check_httpie"
description = "Allow GET and URL-only (default GET), ask for POST/PUT/DELETE/PATCH"

# Mutating methods ask
[[programs.ask]]
subcommand = "POST"
reason = "Sends an HTTP POST request. Mutating method; server-side effects depend on the endpoint."

[[programs.ask]]
subcommand = "PUT"
reason = "Sends an HTTP PUT request. Typically replaces a resource at the target URL."

[[programs.ask]]
subcommand = "DELETE"
reason = "Sends an HTTP DELETE request. Typically removes the resource at the target URL."

[[programs.ask]]
subcommand = "PATCH"
reason = "Sends an HTTP PATCH request. Typically applies a partial update to the resource at the target URL."

# =============================================================================
# NMAP (port scanner - all usage requires approval)
# =============================================================================

[[programs]]
name = "nmap"
unknown_action = "ask"

[[programs.allow]]
subcommand = "--version"

[[programs.allow]]
subcommand = "-V"

[[programs.allow]]
subcommand = "--help"

[[programs.allow]]
subcommand = "-h"

[[programs.ask]]
reason = "Sends port-scan probes to remote hosts. Can be slow on large ranges and is logged by most network security tools."

# =============================================================================
# SOCAT (network relay/tunnel)
# =============================================================================

[[programs]]
name = "socat"
unknown_action = "ask"

[[programs.allow]]
subcommand = "--version"

[[programs.allow]]
subcommand = "-V"

[[programs.allow]]
subcommand = "--help"

[[programs.allow]]
subcommand = "-h"

[[programs.ask]]
reason = "socat sets up bidirectional I/O between two endpoints (network, file, process). Confirm both endpoints; can be used to tunnel out of restricted environments."

# =============================================================================
# TELNET (network connection)
# =============================================================================

[[programs]]
name = "telnet"
unknown_action = "ask"

[[programs.ask]]
reason = "Opens a cleartext telnet session to a host/port. No encryption; credentials sent in the clear."
