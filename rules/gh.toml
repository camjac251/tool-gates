# GitHub CLI (gh) Gate
#
# Handles all `gh` commands with three categories:
# - allow: Read-only operations (list, view, status)
# - ask: Write operations (create, edit, delete, merge)
# - block: Dangerous operations (repo delete, auth logout)
#
# Special handling for `gh api` based on HTTP method.

[meta]
name = "gh"
description = "GitHub CLI permission gate"
priority = 10
lede = "GitHub CLI. Listing, viewing, searching, and read API are safe. Mutations ask. Two patterns are hard-blocked: deleting a repository (irreversible) and logging out (no way to re-authenticate without user interaction)."
note = """<b>Two-pattern block floor.</b> <code>gh repo delete</code> and <code>gh auth logout</code> are the only hard blocks: the first destroys repo history and metadata irreversibly; the second leaves the agent with no way to re-authenticate. Every other mutation asks."""
behavior_tags = ["<b>api</b> method-aware via custom handler"]

[meta.card_titles]
allow = "read-only"
ask = "mutations"

[[programs]]
name = "gh"
unknown_action = "ask" # Unknown gh commands require approval

# API commands have special method-based handling
[programs.api_rules]
trigger = "api"
method_flags = ["-X", "--method"]
safe_methods = ["GET"]
default_method = "GET"
# Flags that implicitly trigger POST (adding fields/data to request body)
implicit_post_flags = ["-f", "-F", "--field", "--raw-field", "--input"]
# Endpoints that are always GET (ignore implicit_post_flags for these)
read_only_endpoints = ["search/"]

# === Blocked Commands ===
# These are never allowed

[[programs.block]]
subcommand = "repo delete"
reason = "Deletes the repository on GitHub. Irreversible: history, issues, PRs, releases, and forks-from-this-repo are removed. Blocked unconditionally."

[[programs.block]]
subcommand = "auth logout"
reason = "Logs out the gh CLI from GitHub. The agent has no way to re-authenticate without user interaction. Blocked unconditionally."

# === Read-Only Commands ===
# These are always allowed

# Issue viewing
[[programs.allow]]
subcommand = "issue view"
reason = "Issue inspection commands."

[[programs.allow]]
subcommand = "issue list"
reason = "Issue inspection commands."

[[programs.allow]]
subcommand = "issue status"
reason = "Issue inspection commands."

# PR viewing
