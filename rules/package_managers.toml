# Package Managers Permission Gate
#
# Handles language package managers:
# - JavaScript: npm, pnpm, yarn, bun
# - Python: pip, uv, poetry, pipx
# - Rust: cargo
# - Go: go
# - Python environments: conda, mamba, micromamba
#
# For each manager, we distinguish between:
# - Read-only commands (list, info, search)
# - Safe local commands (run, test, build)
# - Risky commands (install, publish, init)

[meta]
name = "package_managers"
description = "Language package manager permission gates"
priority = 20
lede = "Language package managers. Listing, inspecting, and auditing are safe. Installing, removing, publishing, and running arbitrary scripts ask. No hard blocks at this layer (the dangerous floor is filesystem-level)."
note = """<b>Custom handlers per package manager.</b> Each program has a small Rust handler (<code>check_npm</code>, <code>check_pnpm</code>, <code>check_yarn</code>, <code>check_pip</code>, <code>check_uv</code>, <code>check_poetry</code>, <code>check_pipx</code>, <code>check_mise</code>) that recognises devtool delegation (e.g. <code>npm eslint</code> routes to the devtools gate), bare invocations (<code>yarn</code> = install), and per-package-manager idioms like <code>pip install --dry-run</code>."""
behavior_tags = [
  "covers <b>npm · pnpm · yarn · bun · pip · uv · cargo · go · poetry · pipx · conda · mise</b>",
]

[meta.card_titles]
allow = "inspection"
ask = "mutations"

# =============================================================================
# NPM
# =============================================================================

[[programs]]
name = "npm"
unknown_action = "ask"

# Read-only commands
[[programs.allow]]
subcommand = "list"
reason = "Lists installed packages in the dependency tree. Read-only."

[[programs.allow]]
subcommand = "ls"
reason = "Lists installed packages in the dependency tree (`npm ls` aliases `npm list`). Read-only."

