[[programs.allow]]
subcommand = "search"

[[programs.allow]]
subcommand = "help"

[[programs.allow]]
subcommand = "config"
unless_flags = ["set", "delete", "edit"]

[[programs.ask]]
subcommand = "config"
reason = "Modifying npm config"
if_flags_any = ["set", "delete", "edit"]

[[programs.allow]]
subcommand = "get"

[[programs.allow]]
subcommand = "prefix"

[[programs.allow]]
