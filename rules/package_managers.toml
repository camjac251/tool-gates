reason = "Manages uv-installed standalone tools: install, uninstall, upgrade, run. Modifies the user-level uv tool directory and binaries on PATH."

[[programs.ask]]
subcommand = "python"
reason = "Manages uv-managed Python interpreters: install, uninstall, pin, find. Downloads interpreter builds and writes to the user-level uv data dir."

[[programs.ask]]
subcommand = "cache"
reason = "Mutates the uv cache (clean, prune). `uv cache clean` deletes all cached wheels and source distributions."

[[programs.ask]]
subcommand = "init"
reason = "Initializes a new uv project in the current directory by writing `pyproject.toml` and supporting files."

[[programs.ask]]
subcommand = "build"
reason = "Builds source and wheel distributions into `dist/`. Writes artifacts; does not publish."

[[programs.ask]]
subcommand = "publish"
reason = "Publishes the package to its registry. Public publish is irreversible: the version number cannot be reused."

# uv pip risky subcommands
[[programs.ask]]
subcommand = "pip install"
reason = "Installs packages into the currently active venv via uv's pip-compatible frontend. Writes to site-packages of `<venv>`."

[[programs.ask]]
subcommand = "pip uninstall"
reason = "Removes packages from the currently active venv via uv's pip-compatible frontend."

# Note: Custom handler for run subcommand (delegates to devtools or asks)
[[custom_handlers]]
program = "uv"
handler = "check_uv"
description = "Handle uv run <tool> (delegates to devtools gate), ask for unknown commands"

