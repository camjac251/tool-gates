# =============================================================================
# MISE (Runtime Version Manager)
# =============================================================================

[[programs]]
name = "mise"
unknown_action = "ask"

# Read-only commands
[[programs.allow]]
subcommand = "ls"
reason = "Lists installed tool versions managed by mise. Read-only."

[[programs.allow]]
subcommand = "list"
reason = "Lists installed tool versions managed by mise (`mise list` aliases `mise ls`). Read-only."

[[programs.allow]]
subcommand = "ls-remote"
reason = "Lists versions available to install for a tool from upstream. Read-only."

[[programs.allow]]
subcommand = "current"
reason = "Prints the tool versions active in the current directory. Read-only."

[[programs.allow]]
subcommand = "where"
reason = "Prints the install path of a given tool version. Read-only."

[[programs.allow]]
subcommand = "which"
reason = "Prints the resolved path to a tool binary. Read-only."

[[programs.allow]]
subcommand = "env"
reason = "Prints the environment variables mise would export for the current directory. Read-only."

[[programs.allow]]
subcommand = "version"
reason = "Prints the mise version. Read-only."

[[programs.allow]]
subcommand = "--version"
reason = "Prints the mise version. Read-only."

[[programs.allow]]
subcommand = "-V"
reason = "Prints the mise version. Read-only."

[[programs.allow]]
subcommand = "--help"
reason = "Prints mise help. Read-only."

[[programs.allow]]
subcommand = "-h"
reason = "Prints mise help. Read-only."

[[programs.allow]]
subcommand = "help"
reason = "Prints help for mise or a specific subcommand. Read-only."

[[programs.allow]]
subcommand = "doctor"
reason = "Runs mise health checks and reports configuration problems. Read-only."

[[programs.allow]]
subcommand = "plugins"
reason = "Lists installed mise plugins. Read-only unless an install/remove/update subcommand is given, which is gated separately."

[[programs.allow]]
subcommand = "settings"
reason = "Shows mise settings values. Read-only in list form."

[[programs.allow]]
subcommand = "alias"
reason = "Shows tool-version aliases configured in mise. Read-only in list form."

[[programs.allow]]
subcommand = "bin-paths"
reason = "Prints the bin directories mise would add to PATH. Read-only."

[[programs.allow]]
subcommand = "completion"
reason = "Prints shell completion scripts for mise. Read-only; output is not installed automatically."

[[programs.allow]]
subcommand = "direnv"
reason = "Prints direnv integration helpers for mise. Read-only; output is not installed automatically."

[[programs.allow]]
subcommand = "outdated"
reason = "Reports installed tool versions that have newer releases available. Read-only; no updates."

# Safe local commands
[[programs.allow]]
subcommand = "reshim"
reason = "Regenerates mise shim scripts for installed tools. Rewrites only mise-managed shim files."

[[programs.allow]]
subcommand = "trust"
reason = "Marks a project's mise config file as trusted so its tool versions and env load. Records trust for the local config path."

[[programs.allow]]
subcommand = "exec"
reason = "Runs a command with mise-managed tool versions on PATH. Devtool delegation is handled by the mise handler."

# mise run/tasks handled separately in mise.rs for task expansion
# but register them here for unknown tasks fallback
[[programs.ask]]
subcommand = "run"
reason = "Running mise task"

[[programs.ask]]
subcommand = "task"
reason = "Manages or runs mise tasks (run, ls, edit, add). `mise task run` executes shell from the task file; treat as running that script."

[[programs.ask]]
subcommand = "tasks"
reason = "Manages or runs mise tasks (run, ls, edit, add). `mise tasks run` executes shell from the task file; treat as running that script."

