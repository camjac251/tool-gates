subcommand = "add"
reason = "Adding packages"

[[programs.ask]]
subcommand = "remove"
reason = "Removing packages"

[[programs.ask]]
subcommand = "rm"
reason = "Removing packages"

[[programs.ask]]
subcommand = "update"
reason = "Updating packages"

[[programs.ask]]
subcommand = "link"
reason = "Creates a global symlink and links the package into node_modules. Modifies bun's global link registry; can shadow real installs of `<package>`."

[[programs.ask]]
subcommand = "unlink"
reason = "Removes the global symlink created by `bun link`. Affects every project that consumed the linked package."

[[programs.ask]]
subcommand = "x"
reason = "Runs an arbitrary command through bun (downloads the package if missing). Same trust boundary as `curl | bash` for untrusted packages."

[[programs.ask]]
subcommand = "init"
reason = "Initializes a new bun project in the current directory by writing `package.json` and supporting files."

[[programs.ask]]
subcommand = "create"
reason = "Scaffolds a project from a `create-<name>` template, downloading it if missing. Same trust boundary as `curl | bash` for untrusted initializers."

[[programs.ask]]
subcommand = "publish"
reason = "Publishes the package to its registry. Public publish is irreversible: the version number cannot be reused."

