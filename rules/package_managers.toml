# Risky commands
[[programs.ask]]
subcommand = "install"
reason = "Installing packages"

[[programs.ask]]
subcommand = "i"
reason = "Installing packages"

[[programs.ask]]
subcommand = "add"
reason = "Installing packages"

[[programs.ask]]
subcommand = "ci"
reason = "Clean install"

[[programs.ask]]
subcommand = "uninstall"
reason = "Uninstalling packages"

[[programs.ask]]
subcommand = "remove"
reason = "Uninstalling packages"

[[programs.ask]]
subcommand = "rm"
reason = "Uninstalling packages"

[[programs.ask]]
subcommand = "un"
reason = "Uninstalling packages"

[[programs.ask]]
subcommand = "update"
reason = "Updating packages"

[[programs.ask]]
subcommand = "up"
reason = "Updating packages"

[[programs.ask]]
subcommand = "upgrade"
reason = "Updating packages"

[[programs.ask]]
subcommand = "link"
reason = "Creates a global symlink to this package and links it into node_modules. Modifies the global npm prefix; can shadow real installs of `<package>` system-wide."

[[programs.ask]]
subcommand = "unlink"
reason = "Removes the global symlink created by `npm link`. Affects every project that consumed the linked package."

[[programs.ask]]
subcommand = "publish"
reason = "Publishes the package to its registry. Public publish is irreversible: the version number cannot be reused."

[[programs.ask]]
subcommand = "unpublish"
reason = "Removes a published version from the registry. Public unpublish is restricted by npm policy and can break downstream consumers."

[[programs.ask]]
subcommand = "deprecate"
reason = "Marks a published version as deprecated on the registry. Shows a warning to every future install of that version."

[[programs.ask]]
subcommand = "init"
reason = "Initializes a new package in the current directory by writing `package.json`. With `npm init <initializer>` it runs an arbitrary `create-<initializer>` package."

[[programs.ask]]
subcommand = "create"
reason = "Runs a `create-<name>` package to scaffold a project, downloading it if missing. Same trust boundary as `curl | bash` for untrusted initializers."

[[programs.ask]]
subcommand = "exec"
reason = "Runs an arbitrary command through the package manager (downloads the package if missing). Same trust boundary as `curl | bash` for untrusted packages."

[[programs.ask]]
subcommand = "npx"
reason = "Runs an arbitrary command through `npx` (downloads the package if missing). Same trust boundary as `curl | bash` for untrusted packages."

[[programs.ask]]
subcommand = "prune"
reason = "Removes packages from `node_modules` that are not listed in `package.json`."

[[programs.ask]]
subcommand = "dedupe"
reason = "Rewrites `node_modules` and `package-lock.json` to reduce duplication. Can change resolved versions."

[[programs.ask]]
subcommand = "shrinkwrap"
reason = "Writes `npm-shrinkwrap.json` to lock the dependency tree for publishing."

[[programs.ask]]
subcommand = "cache"
reason = "Mutates the npm cache (verify, clean, add). `npm cache clean --force` wipes all cached tarballs and metadata."

[[programs.ask]]
subcommand = "pack"
reason = "Builds a tarball of the package as it would be published. Writes a `.tgz` file to the cwd."

[[programs.ask]]
subcommand = "set"
reason = "Sets an npm config key. Default scope is the user-level `.npmrc`; `--global` writes to the global prefix."

# Note: Custom handler for devtool invocation and unknown command handling
[[custom_handlers]]
program = "npm"
handler = "check_npm"
description = "Handle devtool invocation (npm eslint, npm prettier), ask for unknown subcommands"

