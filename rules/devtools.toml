# =============================================================================
# WRANGLER (Cloudflare Workers CLI)
# =============================================================================

[[programs]]
name = "wrangler"
unknown_action = "ask"

[[programs.allow]]
subcommand = "whoami"
reason = "Prints the authenticated Cloudflare account for the current credentials. Read-only."

[[programs.allow]]
subcommand = "--version"
reason = "Prints the wrangler version. Read-only."

[[programs.allow]]
subcommand = "--help"
reason = "Prints wrangler usage help. Read-only."

[[programs.allow]]
subcommand = "tail"
reason = "Streams live logs from a deployed Worker. Read-only observation; does not change the deployment."

[[programs.ask]]
subcommand = "dev"
reason = "wrangler dev: runs the Worker locally on a dev port. Long-running; binds to localhost until interrupted."

[[programs.ask]]
subcommand = "deploy"
reason = "Cloudflare wrangler deploy: publishes the Worker live to Cloudflare. Verify env vs preview vs production; the Worker starts handling traffic immediately."

[[programs.ask]]
subcommand = "publish"
reason = "Cloudflare wrangler publish: pushes the Worker live (older form of deploy). Verify env; the Worker starts handling traffic immediately."

[[programs.ask]]
subcommand = "login"
reason = "wrangler login: starts the OAuth flow and writes Cloudflare credentials to `~/.wrangler` (or `~/.config/.wrangler`). Anyone with read access to the file gets those credentials."

[[programs.ask]]
subcommand = "pages"
reason = "wrangler pages: Cloudflare Pages operation (deploy/dev/project). `pages deploy` publishes a site live to Cloudflare's edge."

# =============================================================================
# TY (Astral Python type checker - read-only)
# =============================================================================

[[programs]]
name = "ty"
unknown_action = "allow"

# --add-ignore inserts ty: ignore comments into source files
[[programs.ask]]
reason = "ty --add-ignore: inserts `ty: ignore` comments into source files at flagged diagnostics. Default ty only reports."
if_flags_any = ["--add-ignore"]
accept_edits_auto_allow = true

# =============================================================================
# MARKDOWNLINT (Markdown linter - read-only)
# =============================================================================

[[programs]]
name = "markdownlint"
unknown_action = "allow"

# --fix / -f modifies files in-place
[[programs.ask]]
reason = "Auto-fixing markdown"
if_flags_any = ["--fix", "-f"]
accept_edits_auto_allow = true

# =============================================================================
# MEDIA / DIAGRAMS
# =============================================================================

# ffprobe: inspects media files, never writes. Always safe.
[[programs]]
name = "ffprobe"
unknown_action = "allow"
reason = "Inspects media files and prints stream and format metadata. Read-only."

# d2: deterministic diagram renderer (text -> svg/png), same class as a formatter.
[[programs]]
name = "d2"
unknown_action = "allow"
reason = "Renders D2 diagram source to an image. Writes the output file when one is specified."

# ffmpeg: transcoding writes output files, so ask by default. Allow only the
# standalone info flags that never accompany a transcode.
[[programs]]
name = "ffmpeg"
unknown_action = "ask"

[[programs.allow]]
if_flags_any = ["-version", "-buildconf", "-L", "-h", "--help"]
reason = "Prints ffmpeg version, build config, license, or usage help. Read-only info flags; no transcode runs."
