# Developer Tools Permission Gate
#
# Handles developer tools that can modify files:
# - sd: Stream editor (pipe mode safe, file args ask)
# - sad: Search and replace with preview
# - ast-grep: AST-based code search/rewrite
# - yq: YAML processor
# - jq: JSON processor (always safe)
# - semgrep: Code analysis with optional autofix
# - comby: Structural search/replace
# - grit: Code migrations
# - watchexec: File watcher
# - biome: JavaScript linter/formatter
# - prettier: Code formatter
# - eslint: JavaScript linter
# - ruff: Python linter/formatter
# - black: Python formatter
# - isort: Python import sorter
#
# Pattern: Most tools are safe in read mode, risky with write flags

[meta]
name = "devtools"
description = "Developer tools permission gate"
priority = 25

# =============================================================================
# SD (pipe mode safe, file args ask)
# =============================================================================

[[programs]]
name = "sd"
unknown_action = "ask"

# sd modifies files in-place when file args given, but reads stdin when piped
[[programs.ask]]
reason = "sd in-place: rewrites the given files (regex find/replace). Without file args sd is a stdin->stdout pipe; with file args it modifies in place."
accept_edits_auto_allow = true

[[custom_handlers]]
program = "sd"
handler = "check_sd"
description = "sd without file args is a stdin→stdout pipe filter (safe); with file args it modifies in-place (ask)"

# =============================================================================
# SAD (preview mode safe, --commit asks)
# =============================================================================

[[programs]]
name = "sad"
unknown_action = "allow"  # Default is preview mode

[[programs.ask]]
reason = "sad --commit: applies the proposed search-and-replace to the matched files. Default sad without `--commit` is preview-only."
if_flags_any = ["--commit"]
accept_edits_auto_allow = true

# =============================================================================
# AST-GREP (search safe, -U/--update-all asks)
# =============================================================================

[[programs]]
name = "ast-grep"
aliases = ["sg"]
unknown_action = "allow"  # Default is search mode

[[programs.ask]]
reason = "ast-grep -U: applies the rewrite pattern across matched files. Default ast-grep is search-only; `-U`/`--update-all` writes the changes."
if_flags_any = ["-U", "--update-all"]
accept_edits_auto_allow = true

# =============================================================================
# YQ (read safe, -i/--inplace asks)
# =============================================================================

[[programs]]
name = "yq"
unknown_action = "allow"  # Default is read mode

[[programs.ask]]
reason = "yq -i: rewrites the YAML file in place per the given expression. Default yq prints to stdout; `-i`/`--inplace` writes the file."
if_flags_any = ["-i", "--inplace"]
accept_edits_auto_allow = true

# =============================================================================
# JQ (always safe - read-only)
# =============================================================================

[[programs]]
name = "jq"
unknown_action = "allow"

# =============================================================================
# SEMGREP (scan safe, --autofix/--fix asks)
# =============================================================================

[[programs]]
name = "semgrep"
unknown_action = "allow"  # Default is scan mode

[[programs.ask]]
reason = "semgrep --autofix: applies rule-driven code rewrites to matched files. Default semgrep only reports findings."
if_flags_any = ["--autofix", "--fix"]
accept_edits_auto_allow = true

# =============================================================================
# COMBY (match safe, -in-place/-i asks)
# =============================================================================

[[programs]]
name = "comby"
unknown_action = "allow"  # Default is match mode

[[programs.ask]]
reason = "comby -in-place: applies the structural match-and-rewrite to the matched files. Default comby prints diffs to stdout."
if_flags_any = ["-in-place", "-i"]
accept_edits_auto_allow = true

# =============================================================================
# GRIT (check safe, apply asks)
# =============================================================================

[[programs]]
name = "grit"
unknown_action = "allow"

[[programs.ask]]
subcommand = "apply"
reason = "grit apply: applies a Grit migration pattern to matched files. Other grit subcommands are read-only/listing operations."
accept_edits_auto_allow = true

# =============================================================================
# WATCHEXEC (always asks - runs commands)
# =============================================================================

[[programs]]
name = "watchexec"
unknown_action = "ask"

[[programs.ask]]
reason = "watchexec: runs the given command whenever matching files change. The wrapped command's side effects fire on every change."

# =============================================================================
# BIOME (check safe, --write asks)
# =============================================================================

[[programs]]
name = "biome"
unknown_action = "allow"

# check --write/--fix/--fix-unsafe asks
[[programs.ask]]
subcommand = "check"
reason = "Writing fixes"
if_flags_any = ["--write", "--fix", "--fix-unsafe"]
accept_edits_auto_allow = true

# format --write asks
[[programs.ask]]
subcommand = "format"
reason = "Formatting files"
if_flags_any = ["--write"]
accept_edits_auto_allow = true

# lint is read-only
[[programs.allow]]
subcommand = "lint"

