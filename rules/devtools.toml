unknown_action = "ask"

[[programs.allow]]
subcommand = "build"
reason = "Builds the production bundle into the configured dist dir. Writes build artifacts only; no dev server is started."

[[programs.allow]]
subcommand = "--version"
reason = "Prints the Parcel version. Read-only."

[[programs.allow]]
subcommand = "--help"
reason = "Prints Parcel usage help. Read-only."

