# AUTOFLAKE (removes unused imports - --check safe, --in-place asks)
# =============================================================================

[[programs]]
name = "autoflake"
unknown_action = "ask"

[[programs.allow]]
if_flags_any = ["--check", "--check-diff"]
reason = "Reports unused imports/variables and prints the diff. Read-only with `--check`/`--check-diff`; no files are written."

[[programs.ask]]
reason = "autoflake --in-place: rewrites Python files to remove unused imports/variables. Default autoflake prints suggested diffs only."
if_flags_any = ["--in-place", "-i"]
accept_edits_auto_allow = true

# =============================================================================
# TSX (TypeScript execute - runs code, always needs approval)
# =============================================================================

[[programs]]
name = "tsx"
unknown_action = "ask"

[[programs.allow]]
subcommand = "--version"
reason = "Prints the tsx version. Read-only; no script is run."

[[programs.allow]]
subcommand = "--help"
reason = "Prints tsx usage help. Read-only; no script is run."

[[programs.ask]]
reason = "tsx: runs the given TypeScript file directly (Node + esbuild). The script's side effects (network, FS, child processes) execute."

