reason = "parcel serve: starts the Parcel dev server on a local port. Binds to localhost until interrupted."

[[programs.ask]]
subcommand = "watch"
reason = "parcel watch: rebuilds the bundle on file changes. Long-running; writes output to the configured dist dir."

# =============================================================================
# PLAYWRIGHT (browser testing)
# =============================================================================

[[programs]]
name = "playwright"
unknown_action = "ask"

[[programs.allow]]
subcommand = "test"
reason = "Runs the Playwright test suite headless and reports results. Writes test artifacts (report, traces) to the configured output dir."

[[programs.allow]]
subcommand = "show-report"
reason = "Serves the existing HTML test report locally for viewing. Read-only; no tests are run."

[[programs.allow]]
subcommand = "show-trace"
reason = "Opens the trace viewer on an existing trace file. Read-only; no tests are run."

[[programs.allow]]
subcommand = "--version"
reason = "Prints the Playwright version. Read-only."

[[programs.allow]]
subcommand = "--help"
reason = "Prints Playwright usage help. Read-only."

[[programs.ask]]
subcommand = "install"
reason = "playwright install: downloads Chromium/Firefox/WebKit binaries to the Playwright cache (~300MB-1GB total)."

[[programs.ask]]
subcommand = "codegen"
reason = "playwright codegen: opens a browser and records user actions as test code. Writes the generated spec to stdout or `-o <file>`."

# =============================================================================
# CYPRESS (browser testing)
# =============================================================================

[[programs]]
name = "cypress"
unknown_action = "ask"

[[programs.allow]]
subcommand = "run"
reason = "Runs the Cypress test suite headless and reports results. Writes test artifacts (videos, screenshots) to the configured output dir."

[[programs.allow]]
subcommand = "verify"
reason = "Verifies that the installed Cypress binary is runnable. Read-only check; no tests are run."

[[programs.allow]]
subcommand = "version"
reason = "Prints Cypress binary and package versions. Read-only."

[[programs.allow]]
subcommand = "info"
reason = "Prints Cypress environment and detected-browser info. Read-only."

