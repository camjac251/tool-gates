# format --check/--diff is read-only
[[programs.allow]]
subcommand = "format"
if_flags_any = ["--check", "--diff"]

# format without --check/--diff asks (writes files)
[[programs.ask]]
subcommand = "format"
reason = "Formatting files"
accept_edits_auto_allow = true

