reason = "Prints the ts-node version. Read-only; no script is run."

[[programs.allow]]
subcommand = "--help"
reason = "Prints ts-node usage help. Read-only; no script is run."

[[programs.ask]]
reason = "ts-node: runs the given TypeScript file under Node. The script's side effects (network, FS, child processes) execute."

