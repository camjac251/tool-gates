[[programs.ask]]
subcommand = "erase"
reason = "coverage erase: deletes the `.coverage` data file in cwd. Pending reports cannot be regenerated without rerunning."

[[programs.ask]]
subcommand = "combine"
reason = "coverage combine: merges multiple `.coverage.*` data files into a single `.coverage` file. Inputs are consumed."

