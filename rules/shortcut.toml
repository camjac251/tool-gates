# Shortcut CLI (short) - Community CLI for Shortcut
# https://github.com/shortcut-cli/shortcut-cli

[meta]
name = "Shortcut CLI"
description = "Shortcut CLI"
priority = 45
lede = "Community <code>short</code> CLI for Shortcut. Searches and listings are safe. Story mutations, comments, attachments, and workflow-state changes ask. The custom handler routes <code>short api</code> by HTTP method."
behavior_tags = ["covers the <b>short</b> CLI"]

[meta.card_titles]
allow = "queries"
ask = "mutations"

[[programs]]
name = "short"
unknown_action = "ask"

# ============================================================================
# INSTALL - Configure API token
# ============================================================================

[[programs.ask]]
subcommand = "install"
reason = "Writes the Shortcut API token to the local `short` config. One-time auth setup."

# ============================================================================
# SEARCH / FIND - Search stories (read-only)
# ============================================================================

# Search with --save writes to config
[[programs.ask]]
subcommand = "search"
reason = "Saves the current search as a named workspace in the local `short` config. Writes to disk; does not change anything on Shortcut."
if_flags_any = ["-S", "--save"]

[[programs.allow]]
subcommand = "search"
reason = "Searching stories"

[[programs.allow]]
subcommand = "find"
reason = "Searching stories"

# ============================================================================
# STORY - View or update a story
# Read-only by default, but update flags require approval
# ============================================================================

# Story with update flags → ask
[[programs.ask]]
subcommand = "story"
reason = "Creates and checks out a local git branch named for the story. Switches your working tree; commit or stash first."
if_flags_any = ["--git-branch", "--git-branch-short"]

[[programs.ask]]
subcommand = "story"
reason = "Downloads the story's attachments to the current directory. Writes files to disk."
if_flags_any = ["-D", "--download"]

[[programs.ask]]
subcommand = "story"
reason = "Posts a comment to the story on Shortcut. Visible to all workspace members."
if_flags_any = ["-c", "--comment"]

[[programs.ask]]
subcommand = "story"
reason = "Overwrites the story's description field. Replaces existing text; back up the current body if it matters."
if_flags_any = ["-d", "--description"]

[[programs.ask]]
subcommand = "story"
reason = "Sets the story's point estimate."
if_flags_any = ["-e", "--estimate"]

[[programs.ask]]
subcommand = "story"
reason = "Reassigns the story to a different epic."
if_flags_any = ["--epic"]

[[programs.ask]]
subcommand = "story"
reason = "Moves the story into a different iteration (sprint)."
if_flags_any = ["-i", "--iteration"]

[[programs.ask]]
subcommand = "story"
reason = "Sets the story's labels."
if_flags_any = ["-l", "--label"]

[[programs.ask]]
subcommand = "story"
reason = "Reorders the story within its workflow column."
if_flags_any = ["--move-after", "--move-before", "--move-down", "--move-up"]

[[programs.ask]]
subcommand = "story"
reason = "Sets the story's owners. Replaces the existing owner list."
if_flags_any = ["-o", "--owners"]

[[programs.ask]]
subcommand = "story"
reason = "Updates the workflow state of story `<story>`. Moves it on the workflow board (e.g., To Do -> In Progress -> Done) and may trigger workflow automations."
if_flags_any = ["-s", "--state"]

[[programs.ask]]
subcommand = "story"
reason = "Renames the story's title."
if_flags_any = ["-t", "--title"]

[[programs.ask]]
subcommand = "story"
reason = "Reassigns the story to a different team."
if_flags_any = ["-T", "--team"]

[[programs.ask]]
subcommand = "story"
reason = "Adds a subtask to the story."
if_flags_any = ["--task"]

[[programs.ask]]
subcommand = "story"
reason = "Toggles a subtask's done state on the story."
if_flags_any = ["--task-complete"]

[[programs.ask]]
subcommand = "story"
reason = "Sets the story type (feature, bug, or chore)."
if_flags_any = ["-y", "--type"]

[[programs.ask]]
subcommand = "story"
reason = "Archives story `<story>`. Hides it from default views but keeps history; reversible via `--archived=false` or the web UI."
if_flags_any = ["-a", "--archived"]

# Story without update flags → allow (read-only view)
[[programs.allow]]
subcommand = "story"
reason = "Viewing story"

# ============================================================================
# CREATE - Create a new story
# ============================================================================

# Create always asks (it's a write operation)
# Note: --git-branch and --git-branch-short are also supported but create already asks
[[programs.ask]]
subcommand = "create"
reason = "Creates a new story in the workspace."

# ============================================================================
# LIST COMMANDS - Read-only entity listing
# ============================================================================

[[programs.allow]]
subcommand = "members"
reason = "Listing members"

[[programs.allow]]
subcommand = "epics"
reason = "Listing epics"

[[programs.allow]]
subcommand = "workflows"
reason = "Listing workflows"

[[programs.allow]]
subcommand = "projects"
reason = "Listing projects"

# ============================================================================
# WORKSPACE - Manage saved search queries
# ============================================================================

# Unsetting a workspace modifies config
[[programs.ask]]
subcommand = "workspace"
reason = "Removes a saved workspace (named search query) from the local `short` config. Does not delete anything on Shortcut."
if_flags_any = ["-u", "--unset"]

# List/load workspaces is read-only
[[programs.allow]]
subcommand = "workspace"
reason = "Listing workspaces"

# ============================================================================
# API - Raw API requests (custom handler needed for -X METHOD parsing)
# ============================================================================

[[custom_handlers]]
program = "short"
handler = "check_short_api"
description = "api subcommand: GET allows, POST/PUT/PATCH/DELETE asks"

# ============================================================================
# HELP - Always safe
# ============================================================================

[[programs.allow]]
subcommand = "help"
reason = "Showing help"
