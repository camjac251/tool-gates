# Git Command Permission Gate
#
# Handles all git commands with careful distinction between:
# - Read-only operations (status, log, diff, etc.)
# - Write operations (add, commit, push, etc.)
# - High-risk operations (force push, hard reset, etc.)
#
# Special handling:
# - --dry-run flag makes any command safe
# - Global options (-C, --git-dir, etc.) are skipped to find actual subcommand
# - Subcommand-specific rules for config, stash, worktree, submodule, remote

[meta]
name = "git"
description = "Git version control permission gate"
priority = 10
lede = "Read-only history and inspection commands pass through. Anything that writes to the tree, the index, or a remote pauses for approval. <b>git</b> is never hard-blocked from this gate. The dangerous floor lives in the filesystem rules and the pre-AST raw-string pass."
note = """<b>Hard blocks live in other gates.</b> The git gate never denies outright. A pattern like <code>curl … | bash</code> is caught by the pre-AST raw-string pass before any gate runs. Destructive filesystem patterns like <code>rm -rf /</code> are denied in <a href=\"filesystem.html\">filesystem.toml</a>."""
behavior_tags = [
  "<b>--dry-run</b> / <b>-n</b> always allows",
  "aliases resolved from <b>~/.gitconfig</b>",
]

[meta.card_titles]
allow = "read-only"
ask = "writes"

[[programs]]
name = "git"
unknown_action = "ask"

# Global flags that override to allow (e.g., --dry-run makes commands safe)
[[programs.allow_if_flags]]
flags_any = ["--dry-run", "-n"]

# === Blocked Commands ===
# None - git commands are never outright blocked, just require approval

# === Read-Only Commands ===
# These are always allowed (pure information retrieval)

[[programs.allow]]
subcommand = "status"
reason = "Shows the working tree status: staged, unstaged, and untracked files. Read-only."

[[programs.allow]]
subcommand = "log"
reason = "Shows commit history. Read-only."

[[programs.allow]]
subcommand = "diff"
reason = "Shows changes between commits, the working tree, and the index. Read-only."

[[programs.allow]]
subcommand = "show"
reason = "Shows a commit, tag, or other object and its contents. Read-only."

[[programs.allow]]
subcommand = "tag"
unless_flags = [
  "-d",
  "--delete",
  "-f",
  "--force",
  "-a",
  "--annotate",
  "-s",
  "--sign",
  "-u",
  "--local-user",
  "-m",
  "--message",
]
reason = "Lists tags when no mutating flag is given. Read-only in this form; creation and deletion flags are gated separately."

[[programs.allow]]
subcommand = "describe"
reason = "Names a commit using the nearest reachable tag. Read-only."

[[programs.allow]]
subcommand = "rev-parse"
reason = "Resolves refs and arguments to object names. Read-only."

[[programs.allow]]
subcommand = "ls-files"
reason = "Lists files tracked in the index. Read-only."

[[programs.allow]]
subcommand = "blame"
reason = "Shows the commit and author that last touched each line of a file. Read-only."

[[programs.allow]]
subcommand = "reflog"
reason = "Shows the history of ref updates such as HEAD movements. Read-only."

[[programs.allow]]
subcommand = "shortlog"
reason = "Summarizes commit history grouped by author. Read-only."

[[programs.allow]]
subcommand = "whatchanged"
reason = "Shows commit history along with the files each commit changed. Read-only."

[[programs.allow]]
subcommand = "ls-tree"
reason = "Lists the contents of a tree object. Read-only."

[[programs.allow]]
subcommand = "cat-file"
reason = "Prints the type, size, or contents of a repository object. Read-only."

[[programs.allow]]
subcommand = "rev-list"
reason = "Lists commit objects in reverse chronological order. Read-only."

[[programs.allow]]
subcommand = "name-rev"
reason = "Names commits by their position relative to refs. Read-only."

[[programs.allow]]
subcommand = "for-each-ref"
reason = "Lists refs matching a pattern, with a customizable format. Read-only."

[[programs.allow]]
subcommand = "symbolic-ref"
reason = "Reads a symbolic ref such as HEAD. Read-only when no value is given; writes are gated separately."

[[programs.allow]]
subcommand = "verify-commit"
reason = "Checks the GPG signature on a commit. Read-only."

[[programs.allow]]
subcommand = "verify-tag"
reason = "Checks the GPG signature on a tag. Read-only."

[[programs.allow]]
subcommand = "fsck"
reason = "Checks repository objects for connectivity and integrity. Read-only."

[[programs.allow]]
subcommand = "count-objects"
reason = "Reports the count and on-disk size of repository objects. Read-only."

[[programs.allow]]
subcommand = "check-ignore"
reason = "Reports which paths are ignored and the matching gitignore rule. Read-only."

[[programs.allow]]
subcommand = "check-attr"
reason = "Reports the gitattributes values applied to given paths. Read-only."

[[programs.allow]]
subcommand = "grep"
reason = "Searches tracked file contents for a pattern. Read-only."

[[programs.allow]]
subcommand = "merge-base"
reason = "Finds the common ancestor of two or more commits. Read-only."

[[programs.allow]]
subcommand = "show-ref"
reason = "Lists refs and the object names they point to. Read-only."

[[programs.ask]]
subcommand = "gc"
reason = "Runs garbage collection in `.git`. Repacks objects and may prune unreachable commits older than the gc grace window."

[[programs.ask]]
subcommand = "prune"
reason = "Deletes unreachable objects from `.git`. Cannot be recovered without a backup or reflog entry still pointing at them."

[[programs.allow]]
subcommand = "help"
reason = "Shows Git help text for a subcommand. Read-only."

[[programs.allow]]
subcommand = "version"
reason = "Prints the installed Git version. Read-only."

[[programs.allow]]
subcommand = "--version"
reason = "Prints the installed Git version. Read-only."

[[programs.allow]]
subcommand = "-h"
reason = "Shows short usage help. Read-only."

[[programs.allow]]
subcommand = "--help"
reason = "Shows full help text. Read-only."

# === Branch Command (mixed read/write) ===
# Listing and creating branches are safe. Only delete/move/copy require approval.

[[programs.allow]]
subcommand = "branch"
unless_flags = [
  "-d",
  "-D",
  "--delete",
  "-m",
  "-M",
  "--move",
  "-c",
  "-C",
  "--copy",
]
reason = "Lists or creates branches. Read-only when listing; delete, move, and copy flags are gated separately."

# === Config Subcommands ===

[[programs.allow]]
subcommand = "config get"
reason = "Reads a Git configuration value. Read-only."

[[programs.allow]]
subcommand = "config list"
reason = "Lists Git configuration values. Read-only."

[[programs.allow]]
subcommand = "config --get"
reason = "Reads a Git configuration value. Read-only."

[[programs.allow]]
subcommand = "config --list"
reason = "Lists Git configuration values. Read-only."

[[programs.ask]]
subcommand = "config set"
reason = "Sets a git config value. `--local` scopes to this repo; `--global` affects all repos for the user."

[[programs.ask]]
subcommand = "config --add"
reason = "Adds a git config entry. `--local` for this repo, `--global` for user-wide."

[[programs.ask]]
subcommand = "config --unset"
reason = "Removes a git config entry. Permanent for the chosen scope."

# === Stash Subcommands ===

[[programs.allow]]
subcommand = "stash list"
reason = "Lists stash entries. Read-only."

[[programs.allow]]
subcommand = "stash show"
reason = "Shows the diff recorded in a stash entry. Read-only."

[[programs.ask]]
subcommand = "stash drop"
reason = "Drops a stash permanently. Run `git stash list` first to confirm the index; cannot be undone."

[[programs.ask]]
subcommand = "stash pop"
reason = "Applies the top stash and removes it. Use `git stash apply` if you want to keep the stash entry."

[[programs.ask]]
subcommand = "stash clear"
reason = "Clears ALL stashes permanently. List with `git stash list` first; cannot be undone."

[[programs.ask]]
subcommand = "stash push"
reason = "Saves working-tree changes to a new stash entry."

[[programs.ask]]
subcommand = "stash apply"
reason = "Applies a stash entry without removing it from the stash list."

# === Worktree Subcommands ===

[[programs.allow]]
subcommand = "worktree list"
reason = "Lists the linked worktrees of this repository. Read-only."

[[programs.ask]]
subcommand = "worktree add"
reason = "Creates a new linked worktree checkout. Writes a new directory and registers it in `.git/worktrees/`."

[[programs.ask]]
subcommand = "worktree remove"
reason = "Removes a worktree directory. Refuses if it has uncommitted changes unless `--force`."

[[programs.ask]]
subcommand = "worktree prune"
reason = "Prunes stale worktree references that no longer point to a real directory."

# === Submodule Subcommands ===

[[programs.allow]]
subcommand = "submodule status"
reason = "Reports the status and checked-out commit of each submodule. Read-only."

# Note: submodule foreach runs arbitrary commands, so it must ask
[[programs.ask]]
subcommand = "submodule foreach"
reason = "`git submodule foreach` runs an arbitrary shell command per submodule. Treat the command as if invoked directly."

[[programs.ask]]
subcommand = "submodule init"
reason = "Registers submodules from `.gitmodules` into the local repo config. Does not fetch content; pair with `submodule update`."

[[programs.ask]]
subcommand = "submodule update"
reason = "Fetches and checks out submodule commits recorded in the superproject. Can overwrite local submodule edits unless `--merge`/`--rebase` is set."

[[programs.ask]]
subcommand = "submodule add"
reason = "Adds a new submodule entry to `.gitmodules` and clones the remote repo into the tree."

[[programs.ask]]
subcommand = "submodule deinit"
reason = "Unregisters submodules and clears their working tree. Use `--force` to drop uncommitted submodule changes."

# === Remote Subcommands ===

[[programs.allow]]
subcommand = "remote"
unless_flags = ["add", "remove", "rename", "set-url"]
reason = "Lists configured remotes. Read-only when listing; add, remove, rename, and set-url are gated separately."

[[programs.allow]]
subcommand = "remote show"
reason = "Shows details about a remote, including its tracked branches. Read-only network query."

[[programs.allow]]
subcommand = "remote -v"
reason = "Lists remotes with their fetch and push URLs. Read-only."

[[programs.allow]]
subcommand = "remote get-url"
reason = "Prints the URL of a remote. Read-only."

[[programs.ask]]
subcommand = "remote add"
reason = "Registers a new remote URL under the given name. Subsequent fetches/pushes will trust this endpoint."

[[programs.ask]]
subcommand = "remote remove"
reason = "Removes a remote and its tracking refs from this repo. Does not affect the remote server."

[[programs.ask]]
subcommand = "remote rename"
reason = "Renames a remote and rewrites tracking-branch refs to use the new name."

[[programs.ask]]
subcommand = "remote set-url"
reason = "Changes the URL of an existing remote. Future fetches/pushes will hit the new endpoint."

# === High-Risk Commands (ask with warning) ===

[[programs.ask]]
subcommand = "push"
reason = "Force push overwrites upstream history. Safer: `--force-with-lease` fails if the remote moved."
if_flags_any = ["--force", "-f"]
warn = true

[[programs.ask]]
subcommand = "reset"
reason = "Hard reset discards uncommitted changes in the working tree and index. Safer: `git stash` first, or `git reset --soft` to keep changes staged."
if_flags_any = ["--hard"]
warn = true

[[programs.ask]]
subcommand = "clean"
reason = "Permanently deletes untracked files. Preview with `-n` (dry run) first; deletions cannot be undone."
if_flags_any = ["-fd", "-fdx", "-f"]
warn = true

# === Write Commands ===
# These require user approval

[[programs.ask]]
subcommand = "commit"
reason = "Records staged changes as a new commit on the current branch."

[[programs.ask]]
subcommand = "push"
reason = "Publishes local commits to a remote. Inspect `git log @{u}..` first to see what would be sent."

[[programs.ask]]
subcommand = "pull"
reason = "Fetches and integrates remote changes into the current branch. Use `--rebase` to avoid merge commits."

[[programs.ask]]
subcommand = "merge"
reason = "Merges another branch into the current one. Can produce conflicts; abort with `git merge --abort`."

[[programs.ask]]
subcommand = "rebase"
reason = "Replays commits from the current branch onto another base, rewriting their SHAs. Interactive (`-i`) hangs the agent; abort a stuck rebase with `git rebase --abort`."

# checkout with specific flag conditions (checked before general checkout)
[[programs.ask]]
subcommand = "checkout"
reason = "Creates a new branch and switches to it. `-B` resets an existing branch of the same name to the start point."
if_flags_any = ["-b", "-B"]

[[programs.ask]]
subcommand = "checkout"
reason = "Discards uncommitted changes in the listed paths. Cannot be undone."
if_flags_any = ["--"]

[[programs.ask]]
subcommand = "checkout"
reason = "Switches branches or restores files in the working tree. Uncommitted edits in affected files may be lost."

[[programs.ask]]
subcommand = "switch"
reason = "Switches the working tree to another branch. Refuses if local edits would conflict unless `--discard-changes` is set."

[[programs.ask]]
subcommand = "reset"
reason = "Moves HEAD and optionally the index/working tree. `--soft` keeps changes staged, `--mixed` (default) unstages, `--hard` discards."

[[programs.ask]]
subcommand = "restore"
reason = "Restores files in the working tree from the index or a commit. Overwrites uncommitted edits in the targeted paths."

[[programs.ask]]
subcommand = "clean"
reason = "Cleans the working tree. Preview with `-n` first if unsure what would be deleted."

[[programs.ask]]
subcommand = "cherry-pick"
reason = "Replays the listed commits on the current branch. May produce conflicts; abort with `git cherry-pick --abort`."

[[programs.ask]]
subcommand = "revert"
reason = "Creates a new commit that undoes the listed commits. Preserves history; does not rewrite it."

[[programs.ask]]
subcommand = "am"
reason = "Applies a mailbox patch series as commits. Stops on conflict; resolve and `git am --continue`."

[[programs.ask]]
subcommand = "apply"
reason = "Applies a patch to the working tree (no commit created). Use `--check` to preview without writing."

[[programs.ask]]
subcommand = "format-patch"
reason = "Writes one `.patch` file per commit in the specified range. Output goes to the working directory."

[[programs.ask]]
subcommand = "init"
reason = "Creates a new git repository in the current directory. Writes a `.git/` directory."

[[programs.ask]]
subcommand = "clone"
reason = "Clones a remote repository into a new directory. Network operation; size depends on remote history."

[[programs.ask]]
subcommand = "fetch"
reason = "Downloads refs and objects from a remote. Does not modify the working tree or current branch."

[[programs.ask]]
subcommand = "mv"
reason = "Moves or renames a tracked file and stages the rename in one step."

[[programs.ask]]
subcommand = "rm"
reason = "Removes a tracked file from the working tree and stages the deletion. `--cached` keeps the file on disk."

# Tag mutations
[[programs.ask]]
subcommand = "tag"
reason = "Creates a tag pointing at the named commit (HEAD by default). Local only until `git push --tags`."
if_flags_any = [
  "-a",
  "--annotate",
  "-s",
  "--sign",
  "-u",
  "--local-user",
  "-m",
  "--message",
]

[[programs.ask]]
subcommand = "tag"
reason = "Deletes a local tag. Use `git push --delete <remote> <tag>` separately to delete it on the remote."
if_flags_any = ["-d", "--delete"]

[[programs.ask]]
subcommand = "tag"
reason = "Force-replacing a tag breaks anyone who already pulled it. Confirm no downstream consumers."
if_flags_any = ["-f", "--force"]

# Branch mutations
[[programs.ask]]
subcommand = "branch"
reason = "Deletes a branch ref. `-d` refuses if the branch has unmerged commits; `-D` forces the delete regardless. Recover via `git reflog` if done by mistake."
if_flags_any = ["-d", "-D", "--delete"]

[[programs.ask]]
subcommand = "branch"
reason = "Renames a branch. `-M` forces the rename even if it would overwrite an existing branch name."
if_flags_any = ["-m", "-M", "--move"]

# Interactive debugging
[[programs.ask]]
subcommand = "bisect"
reason = "Starts a binary-search session over commit history. Mutates HEAD across iterations; end with `git bisect reset`."

# History rewriting (dangerous)
[[programs.ask]]
subcommand = "filter-branch"
reason = "Rewrites commit history. Safer alternatives: `git revise --autosquash` for fixups, `git absorb` for auto-folding edits. `git-filter-repo` is the maintained replacement for filter-branch."

[[programs.ask]]
subcommand = "filter-repo"
reason = "Rewrites commit history. Refuses to run on non-fresh clones; use `--force` only with intent."

# Git notes - modifies commit metadata
[[programs.ask]]
subcommand = "notes"
reason = "Adds, edits, or removes notes attached to commits. Stored in `refs/notes/*`; not shown in default `git log`."

# Bundle operations
[[programs.ask]]
subcommand = "bundle"
reason = "Creates or unpacks a git bundle file (offline-transportable pack of refs and objects)."

# Maintenance
[[programs.ask]]
subcommand = "maintenance"
reason = "Runs repo maintenance tasks (gc, commit-graph, prefetch, loose-objects). Modifies `.git/` in the background."

# Sparse checkout
[[programs.ask]]
subcommand = "sparse-checkout"
reason = "Modifies sparse-checkout config. Changes which files are materialized in the working tree."

# Worktree operations
[[programs.ask]]
subcommand = "worktree"
reason = "Worktree operation. See `git worktree --help` for subcommand-specific risk."

# === Custom Handlers ===
# Complex logic that requires Rust code

[[custom_handlers]]
program = "git"
handler = "extract_subcommand"
description = "Skip global options (-C, --git-dir, -c, etc.) to find actual subcommand"

[[custom_handlers]]
program = "git"
handler = "check_git_add"
description = "Handle git add with special checks for -A, --all, ., wildcards"
