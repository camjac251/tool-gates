[[programs]]
name = "swift"
unknown_action = "ask"

[[programs.allow]]
if_flags_any = ["--version", "--help", "-h"]
reason = "Info flags. Always safe."

[[programs.allow]]
subcommand = "build"
reason = "Compiles the Swift package. Outputs land under `.build/`; no code is executed."

[[programs.allow]]
subcommand = "test"
reason = "Runs the Swift package test suite. Builds and executes tests locally; outputs land under `.build/`."

[[programs.ask]]
subcommand = "run"
