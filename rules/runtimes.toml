# Language Runtimes Permission Gate
#
# Handles language runtime invocations:
# - Python: python3, python
# - Node.js: node
# - Ruby: ruby
# - Deno: deno
# - PHP: php
# - Lua: lua, luajit
# - Java: java, javac
# - .NET: dotnet
# - Swift: swift
# - Elixir: elixir, iex
# - Perl: perl (handled in filesystem gate for -i, here for general use)
#
# Pattern:
# - Version/help flags are always safe
# - Code execution (-c, -e, scripts) requires approval
# - Language-specific read-only subcommands are safe

[meta]
name = "runtimes"
description = "Language runtime permission gate"
priority = 27

# =============================================================================
# PYTHON3 / PYTHON
# =============================================================================

[[programs]]
name = "python3"
aliases = ["python", "python3.11", "python3.12", "python3.13", "python3.14"]
unknown_action = "ask"

# Read-only flags
[[programs.allow]]
if_flags_any = ["--version", "-V", "-VV"]

[[programs.allow]]
if_flags_any = ["--help", "-h"]

[[programs.ask]]
reason = "Executes inline Python via `-c`. Treat the code as an inline script; can import any installed module."
if_flags_any = ["-c"]

[[programs.ask]]
reason = "Runs an installed Python module via `-m <module>`. Module code runs with the current interpreter; inherits the active venv if one is on PATH."
if_flags_any = ["-m"]

[[programs.ask]]
reason = "Runs a Python script file. The script runs with the current interpreter; inherits the active venv if one is on PATH."

# =============================================================================
# NODE
# =============================================================================

[[programs]]
name = "node"
unknown_action = "ask"

# Read-only flags
[[programs.allow]]
if_flags_any = ["--version", "-v"]

[[programs.allow]]
if_flags_any = ["--help", "-h"]

# Syntax check is safe (no execution)
[[programs.allow]]
if_flags_any = ["-c", "--check"]

[[programs.ask]]
reason = "Executes inline JavaScript via `-e`. Treat the code as an inline script; full Node API access."
if_flags_any = ["-e", "--eval", "-p", "--print"]

[[programs.ask]]
reason = "Runs a Node.js script file. Full Node API access including filesystem, network, and child processes."

# =============================================================================
# RUBY
# =============================================================================

[[programs]]
name = "ruby"
unknown_action = "ask"

[[programs.allow]]
if_flags_any = ["--version", "-v"]

[[programs.allow]]
if_flags_any = ["--help", "-h"]

# Syntax check is safe (no execution)
[[programs.allow]]
if_flags_any = ["-c"]

[[programs.ask]]
reason = "Executes inline Ruby via `-e`. Treat the code as an inline script; full stdlib access."
if_flags_any = ["-e"]

[[programs.ask]]
reason = "Runs a Ruby script file. Full stdlib access including filesystem, network, and child processes."

# =============================================================================
# DENO
# =============================================================================

[[programs]]
name = "deno"
unknown_action = "ask"

# Read-only commands
[[programs.allow]]
subcommand = "--version"

[[programs.allow]]
subcommand = "-V"

[[programs.allow]]
subcommand = "--help"

[[programs.allow]]
subcommand = "-h"

[[programs.allow]]
subcommand = "check"

[[programs.allow]]
subcommand = "lint"

[[programs.allow]]
subcommand = "doc"

[[programs.allow]]
subcommand = "info"

[[programs.allow]]
subcommand = "types"

[[programs.allow]]
subcommand = "completions"

[[programs.allow]]
subcommand = "help"

# Read-only when --check is present
[[programs.allow]]
subcommand = "fmt"
if_flags_any = ["--check"]

# Test runner (read-only execution)
[[programs.allow]]
subcommand = "test"

[[programs.allow]]
subcommand = "bench"

# Write/execute commands
[[programs.ask]]
subcommand = "run"
reason = "Runs a Deno script. Permissions are sandboxed by default; flags like `--allow-all` / `--allow-net` / `--allow-write` widen access."

[[programs.ask]]
subcommand = "serve"
reason = "Starts a Deno HTTP server. Binds a port (default 8000) and listens for incoming requests."

[[programs.ask]]
subcommand = "fmt"
reason = "Formats source files in place. Rewrites every matching file under the target paths."
accept_edits_auto_allow = true

[[programs.ask]]
subcommand = "compile"
reason = "Produces a standalone executable for the script. Writes a binary that embeds the Deno runtime and the script's modules."

[[programs.ask]]
subcommand = "install"
reason = "Installs a script as a global executable on PATH, or installs project dependencies. The global form writes to the Deno install root."

[[programs.ask]]
subcommand = "uninstall"
reason = "Removes a Deno-installed global executable from the Deno install root."

[[programs.ask]]
subcommand = "task"
reason = "Runs a named task from `deno.json`. Executes the task's shell command line; treat as running that command."

[[programs.ask]]
subcommand = "upgrade"
reason = "Replaces the Deno binary with a newer release. Modifies the installed `deno` executable on PATH."

[[programs.ask]]
subcommand = "add"
reason = "Adds a dependency to `deno.json` imports. Network fetch on next resolve."

[[programs.ask]]
subcommand = "remove"
reason = "Removes a dependency from `deno.json` imports."

[[programs.ask]]
subcommand = "publish"
reason = "Uploads the module to JSR. Public publish is irreversible: the version number cannot be reused."

# =============================================================================
# PHP
# =============================================================================

[[programs]]
name = "php"
unknown_action = "ask"

[[programs.allow]]
if_flags_any = ["--version", "-v"]

[[programs.allow]]
if_flags_any = ["--help", "-h"]

[[programs.allow]]
if_flags_any = ["--info", "-i"]

# Syntax check is read-only
[[programs.allow]]
if_flags_any = ["-l", "--syntax-check"]

# List modules is safe
[[programs.allow]]
if_flags_any = ["-m"]

[[programs.ask]]
reason = "Executes inline PHP via `-r`. Treat the code as an inline script."
if_flags_any = ["-r"]

[[programs.ask]]
reason = "Runs a PHP script file. Full PHP API access including filesystem, network, and shell execution."

# =============================================================================
# LUA / LUAJIT
# =============================================================================

[[programs]]
name = "lua"
aliases = ["luajit", "lua5.1", "lua5.2", "lua5.3", "lua5.4"]
unknown_action = "ask"

[[programs.allow]]
if_flags_any = ["-v"]

[[programs.ask]]
reason = "Executes inline Lua via `-e`. Treat the code as an inline script."
if_flags_any = ["-e"]

[[programs.ask]]
reason = "Runs a Lua script file. Full Lua stdlib access including `io`, `os`, and loaded C modules."

# =============================================================================
# JAVA / JAVAC
# =============================================================================

[[programs]]
name = "java"
unknown_action = "ask"

[[programs.allow]]
if_flags_any = ["--version", "-version", "--help", "-help", "-h"]

[[programs.ask]]
reason = "Runs a Java class, JAR, or single source file. Full JVM access; classpath-loaded code runs unsandboxed."

[[programs]]
name = "javac"
unknown_action = "ask"

[[programs.allow]]
if_flags_any = ["--version", "-version", "--help", "-help"]

[[programs.ask]]
reason = "Compiles Java source files into `.class` bytecode. Writes output to the configured destination directory."

# =============================================================================
# DOTNET (.NET CLI)
# =============================================================================

[[programs]]
name = "dotnet"
unknown_action = "ask"

# Read-only
[[programs.allow]]
if_flags_any = ["--version", "--info", "--list-sdks", "--list-runtimes"]

[[programs.allow]]
subcommand = "--help"

[[programs.allow]]
subcommand = "-h"

[[programs.allow]]
subcommand = "help"

# Local build/test (safe)
[[programs.allow]]
subcommand = "build"

[[programs.allow]]
subcommand = "test"

[[programs.allow]]
subcommand = "run"

[[programs.allow]]
subcommand = "clean"

[[programs.allow]]
subcommand = "restore"

# Read-only inspection
[[programs.allow]]
subcommand = "list"

[[programs.allow]]
subcommand = "sln"

# Mutation commands
[[programs.ask]]
subcommand = "publish"
reason = "Publishing application"

[[programs.ask]]
subcommand = "new"
reason = "Creating project"

[[programs.ask]]
subcommand = "add"
reason = "Adding reference/package"

[[programs.ask]]
subcommand = "remove"
reason = "Removing reference/package"

[[programs.ask]]
subcommand = "nuget"
reason = "NuGet operation"

[[programs.ask]]
subcommand = "tool"
reason = "Tool management"

[[programs.ask]]
subcommand = "pack"
reason = "Creating NuGet package"

# Format --check is read-only
[[programs.allow]]
subcommand = "format"
if_flags_any = ["--check", "--verify-no-changes"]

[[programs.ask]]
subcommand = "format"
reason = "Formatting code"
accept_edits_auto_allow = true

# =============================================================================
# SWIFT (Swift compiler/package manager)
# =============================================================================

[[programs]]
name = "swift"
unknown_action = "ask"

[[programs.allow]]
if_flags_any = ["--version", "--help", "-h"]

[[programs.allow]]
subcommand = "build"

[[programs.allow]]
subcommand = "test"

[[programs.ask]]
subcommand = "run"
reason = "Builds and runs the Swift executable target in the current package. Full Swift runtime access."

[[programs.ask]]
subcommand = "package"
reason = "Manages the Swift package: init, update, resolve, generate-xcodeproj, clean. Mutates `Package.resolved` and the build cache."

# =============================================================================
# ELIXIR / IEX
# =============================================================================

[[programs]]
name = "elixir"
unknown_action = "ask"

[[programs.allow]]
if_flags_any = ["--version", "-v"]

[[programs.allow]]
if_flags_any = ["--help", "-h"]

[[programs.ask]]
reason = "Executes inline Elixir via `-e`. Treat the code as an inline script."
if_flags_any = ["-e"]

[[programs.ask]]
reason = "Runs an Elixir script file (`.exs` / `.ex`). Full Elixir and Erlang stdlib access."

[[programs]]
name = "iex"
unknown_action = "ask"

[[programs.allow]]
if_flags_any = ["--version", "-v"]

[[programs.ask]]
reason = "Starts the interactive Elixir REPL. Each input is evaluated with full Elixir and Erlang stdlib access."
