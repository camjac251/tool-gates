# =============================================================================
# DOTNET (.NET CLI)
# =============================================================================

[[programs]]
name = "dotnet"
unknown_action = "ask"

# Read-only
[[programs.allow]]
if_flags_any = ["--version", "--info", "--list-sdks", "--list-runtimes"]
reason = "Info flags. Always safe."

[[programs.allow]]
subcommand = "--help"
reason = "Info flags. Always safe."

[[programs.allow]]
subcommand = "-h"
reason = "Info flags. Always safe."

[[programs.allow]]
subcommand = "help"
reason = "Prints `dotnet` help text. Read-only."

# Local build/test (safe)
[[programs.allow]]
subcommand = "build"
reason = "Local build, test, and dependency restore. Outputs land under `bin/` and `obj/`."

[[programs.allow]]
subcommand = "test"
reason = "Local build, test, and dependency restore. Outputs land under `bin/` and `obj/`."

[[programs.allow]]
subcommand = "run"
reason = "Local build, test, and dependency restore. Outputs land under `bin/` and `obj/`."

[[programs.allow]]
subcommand = "clean"
reason = "Deletes build outputs under `bin/` and `obj/` for the project. Local cleanup only."

[[programs.allow]]
subcommand = "restore"
reason = "Local build, test, and dependency restore. Outputs land under `bin/` and `obj/`."

# Read-only inspection
[[programs.allow]]
subcommand = "list"
reason = "Lists project references or installed packages. Read-only."

[[programs.allow]]
subcommand = "sln"
reason = "Inspects or edits the solution file's project list. Reads with no args; `add`/`remove` rewrite the `.sln`."

# Mutation commands
[[programs.ask]]
subcommand = "publish"
reason = "Publishing application"

[[programs.ask]]
subcommand = "new"
reason = "Creating project"

[[programs.ask]]
subcommand = "add"
reason = "Adding reference/package"

[[programs.ask]]
subcommand = "remove"
reason = "Removing reference/package"

[[programs.ask]]
subcommand = "nuget"
reason = "NuGet operation"

[[programs.ask]]
subcommand = "tool"
reason = "Tool management"

[[programs.ask]]
subcommand = "pack"
reason = "Creating NuGet package"

# Format --check is read-only
[[programs.allow]]
subcommand = "format"
if_flags_any = ["--check", "--verify-no-changes"]
reason = "Reports formatting issues without writing. `--check` and `--verify-no-changes` make it read-only."

[[programs.ask]]
subcommand = "format"
reason = "Formatting code"
accept_edits_auto_allow = true

