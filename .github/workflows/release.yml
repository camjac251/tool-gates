name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and upload binaries for (leave empty for auto-release)"
        required: false

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: tool-gates

jobs:
  release-plz-pr:
    name: Release PR
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  release:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: read
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        id: release-plz
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: extract
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          TAG=$(echo "$RELEASES" | jq -r '.[0].tag')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build - ${{ matrix.arch }}
    needs: release
    if: >-
      always() &&
      (needs.release.outputs.releases_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            arch: linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            arch: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            arch: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: windows-x86_64
            ext: .exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            arch: windows-arm64
            ext: .exe
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release.outputs.tag || inputs.tag }}
          persist-credentials: false

      - name: Build with cross
        if: contains(matrix.target, 'linux')
        uses: houseabsolute/actions-rust-cross@fe6ede73c7f0a50412ec05994e2aa5a7bf635eac # v1.0.7
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--locked --release"
          strip: true

      - name: Build native
        if: "!contains(matrix.target, 'linux')"
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --locked --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }}"
          DST="${{ env.BINARY_NAME }}-${{ matrix.arch }}${{ matrix.ext }}"
          cp "$SRC" "$DST"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.arch }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.arch }}${{ matrix.ext }}

  upload:
    name: Upload Binaries
    needs: [release, build]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (needs.release.outputs.releases_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "artifacts/*"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag || inputs.tag }}
        run: gh release upload "$TAG" artifacts/* --repo "$GITHUB_REPOSITORY" --clobber

  update-homebrew:
    name: Update Homebrew Tap
    needs: [release, build, upload]
    if: needs.upload.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate token for homebrew-tap
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: camjac251
          repositories: homebrew-tap

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: camjac251/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap
          ref: main

      - name: Update formula
        env:
          TAG: ${{ needs.release.outputs.tag || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          SHA1=$(sha256sum artifacts/tool-gates-macos-arm64 | cut -d' ' -f1)
          SHA2=$(sha256sum artifacts/tool-gates-macos-x86_64 | cut -d' ' -f1)
          SHA3=$(sha256sum artifacts/tool-gates-linux-arm64 | cut -d' ' -f1)
          SHA4=$(sha256sum artifacts/tool-gates-linux-x86_64 | cut -d' ' -f1)

          homebrew-tap/scripts/update-formula.sh \
            homebrew-tap/Formula/tool-gates.rb \
            "$VERSION" "$SHA1" "$SHA2" "$SHA3" "$SHA4"

          cd homebrew-tap
          git config user.name "brew-bottler[bot]"
          git config user.email "brew-bottler[bot]@users.noreply.github.com"
          git add Formula/tool-gates.rb
          git diff --cached --quiet || { git commit -m "tool-gates $VERSION" && git push; }
