name: Release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: bash-gates

jobs:
  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: read
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: release-plz/action@v0.5
        id: release-plz
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: extract
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          TAG=$(echo "$RELEASES" | jq -r '.[0].tag')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build - ${{ matrix.arch }}
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            arch: linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            arch: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            arch: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: macos-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Build with cross
        if: contains(matrix.target, 'linux')
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--locked --release"
          strip: true

      - name: Build native
        if: "!contains(matrix.target, 'linux')"
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          DST="${{ env.BINARY_NAME }}-${{ matrix.arch }}"
          cp "$SRC" "$DST"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.arch }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.arch }}

  upload:
    name: Upload Binaries
    needs: [release, build]
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: gh release upload "$TAG" artifacts/* --repo "$GITHUB_REPOSITORY" --clobber
