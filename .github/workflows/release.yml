name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and upload binaries for (e.g. v0.2.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: tool-gates

jobs:
  release-please:
    name: Release Please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: rust

  build:
    name: Build - ${{ matrix.arch }}
    needs: release-please
    if: >-
      always() &&
      ((github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
      github.event_name == 'workflow_dispatch')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            arch: linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            arch: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            arch: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: macos-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name || inputs.tag }}

      - name: Build with cross
        if: contains(matrix.target, 'linux')
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release"
          strip: true

      - name: Build native
        if: "!contains(matrix.target, 'linux')"
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          DST="${{ env.BINARY_NAME }}-${{ matrix.arch }}"
          cp "$SRC" "$DST"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.arch }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.arch }}

  upload:
    name: Upload Binaries
    needs: [release-please, build]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      ((github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
      github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
        run: gh release upload "$TAG" artifacts/* --repo "$GITHUB_REPOSITORY" --clobber
